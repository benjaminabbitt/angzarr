# Cargo Mutants configuration
# See: https://mutants.rs/reference/config.html

# Exclude generated proto code and build scripts
exclude_globs = [
    "client/rust/src/proto/**",
    "proto/**",
    "**/build.rs",
    # Exclude binary entry points (main functions)
    "src/bin/**",
    "examples/rust/*/agg/src/main.rs",
    "examples/rust/*/saga-*/src/main.rs",
    "examples/rust/*/pmg-*/src/main.rs",
    "examples/rust/*/prj-*/src/main.rs",
    # Exclude test code from mutation
    "**/tests/**",
    "tests/**",
]

# Exclude trivial functions that don't need mutation testing
exclude_re = [
    # Trait implementations that are pure delegation
    "fn default\\(",
    "fn fmt\\(",
    "fn from\\(",
    "fn into\\(",
    "fn clone\\(",
    # Logging and tracing (side effect only)
    "fn trace\\(",
    "fn debug\\(",
    "fn info\\(",
    "fn warn\\(",
    "fn error\\(",
]

# Focus mutation testing on business logic first
# Run with: cargo mutants --in-place
# Or specific directories: cargo mutants -d examples/rust/player/agg

# Recommended mutation testing priorities:
# 1. examples/rust/*/agg/src/handlers/ - aggregate business logic
# 2. examples/rust/*/saga-*/src/       - saga translation logic
# 3. src/utils/                         - framework utilities
# 4. src/storage/                       - storage implementations
