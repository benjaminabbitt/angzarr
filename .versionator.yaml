# Versionator Configuration for angzarr
# See: versionator --help

# Version prefix for git tags (v1.2.3)
prefix: "v"

# Pre-release configuration
prerelease:
  enabled: false
  template: "alpha-{{CommitsSinceTag}}"

# Build metadata configuration
metadata:
  enabled: false
  type: "git"
  template: "{{BuildDateTimeCompact}}.{{MediumHash}}"
  git:
    hashLength: 12

logging:
  output: "console"

# Keep manifest files in sync with VERSION on release
updates:
  - file: Cargo.toml
    path: package.version
    template: "{{MajorMinorPatch}}"
  - file: deploy/k8s/helm/angzarr/Chart.yaml
    path: version
    template: "{{MajorMinorPatch}}"
  - file: deploy/k8s/helm/angzarr/Chart.yaml
    path: appVersion
    template: "{{MajorMinorPatch}}"
  - file: proto/buf_version.yaml
    path: version
    template: "{{MajorMinorPatch}}"
