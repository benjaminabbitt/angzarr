// DOC: This file is referenced in docs/docs/reference/patterns.mdx
//      Update documentation when making changes to MergeStrategy, SyncMode,
//      Edition, SnapshotRetention, or Notification types.

syntax = "proto3";
package angzarr;

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Angzarr";
option go_package = "github.com/angzarr/angzarr/proto/angzarr";
option java_multiple_files = true;
option java_package = "dev.angzarr";
option ruby_package = "Angzarr";

message UUID {
  bytes value = 1;
}

// docs:start:cover
message Cover {
  string domain = 2;
  UUID root = 1;
  string correlation_id = 3; // Workflow correlation - flows through all commands/events
  Edition edition = 4; // Edition for diverged timelines; empty name = main timeline
  // Field 5 removed: external_id moved to ExternalDeferredSequence in PageHeader
}
// docs:end:cover

// docs:start:edition
// Edition identifier with optional explicit divergence points.
//
// Two modes:
// - Implicit (divergences empty): Divergence derived from first edition event's sequence
// - Explicit (divergences populated): Per-domain divergence points for historical branching,
//  saga coordination, or speculative execution
message Edition {
  string name = 1; // Edition name, e.g., "v2"; empty = main timeline
  repeated DomainDivergence divergences = 2; // Optional: explicit per-domain divergence points
}

// Explicit divergence point for a specific domain.
// Used when creating historical branches or coordinating saga writes across domains.
message DomainDivergence {
  string domain = 1; // Domain name
  uint32 sequence = 2; // Divergence sequence number
}
// docs:end:edition

// docs:start:sync_mode
// Controls synchronous processing behavior
enum SyncMode {
  SYNC_MODE_ASYNC = 0; // Async: fire and forget (default)
  SYNC_MODE_SIMPLE = 1; // Sync projectors only, no saga cascade
  SYNC_MODE_CASCADE = 2; // Full sync: projectors + saga cascade (expensive)
}
// docs:end:sync_mode

// docs:start:cascade_error_mode
// Controls how CASCADE mode handles errors from sagas/PMs.
// Only relevant when sync_mode = CASCADE.
enum CascadeErrorMode {
  CASCADE_ERROR_FAIL_FAST = 0; // Stop on first error, fail request (default)
  CASCADE_ERROR_CONTINUE = 1; // Continue through all, return successes + errors
  CASCADE_ERROR_COMPENSATE = 2; // On first error, compensate executed commands, fail request
  CASCADE_ERROR_DEAD_LETTER = 3; // On error, send to DLQ and continue with remaining
}
// docs:end:cascade_error_mode

// docs:start:merge_strategy
// Controls how concurrent commands to the same aggregate are handled
enum MergeStrategy {
  MERGE_COMMUTATIVE = 0; // Default: allow if state field mutations don't overlap
  MERGE_STRICT = 1; // Reject if sequence mismatch (optimistic concurrency)
  MERGE_AGGREGATE_HANDLES = 2; // Aggregate handles its own concurrency
  MERGE_MANUAL = 3; // Send to DLQ for manual review on mismatch
}
// docs:end:merge_strategy

// docs:start:snapshot_retention
// Controls snapshot retention during cleanup
enum SnapshotRetention {
  RETENTION_DEFAULT = 0; // Persist every 16 events, treated as TRANSIENT otherwise
  RETENTION_PERSIST = 1; // Keep indefinitely (business milestone)
  RETENTION_TRANSIENT = 2; // Delete when newer snapshot written
}
// docs:end:snapshot_retention

// docs:start:payload_reference
// Storage backend type for externally stored payloads (claim check pattern).
enum PayloadStorageType {
  PAYLOAD_STORAGE_TYPE_UNSPECIFIED = 0;
  PAYLOAD_STORAGE_TYPE_FILESYSTEM = 1;
  PAYLOAD_STORAGE_TYPE_GCS = 2;
  PAYLOAD_STORAGE_TYPE_S3 = 3;
}

// Reference to externally stored payload (claim check pattern).
// Used when event/command payloads exceed message bus size limits.
message PayloadReference {
  PayloadStorageType storage_type = 1;
  // Location URI:
  // - file:///var/angzarr/payloads/{hash}.bin
  // - gs://bucket/prefix/{hash}.bin
  // - s3://bucket/prefix/{hash}.bin
  string uri = 2;
  // Content hash for integrity verification and deduplication (SHA-256)
  bytes content_hash = 3;
  // Original serialized payload size in bytes
  uint64 original_size = 4;
  // Timestamp when payload was stored (for TTL cleanup)
  google.protobuf.Timestamp stored_at = 5;
}
// docs:end:payload_reference

// docs:start:page_header
// Shared header for CommandPage and EventPage.
// Encodes sequence type and provenance for framework processing.
message PageHeader {
  oneof sequence_type {
    uint32 sequence = 1; // Explicit sequence (aggregate handlers, legacy)
    ExternalDeferredSequence external_deferred = 2; // External fact (Stripe, FedEx, etc.)
    AngzarrDeferredSequence angzarr_deferred = 3; // Saga-produced command/fact
  }
}

// For facts from external systems (webhooks, integrations).
// Framework stamps sequence on delivery; idempotency via external_id.
message ExternalDeferredSequence {
  string external_id = 1; // Idempotency key from external system (e.g., "pi_1234" from Stripe)
  string description = 2; // Human-readable origin (e.g., "Stripe webhook")
}

// For saga-produced commands and facts.
// Framework stamps sequence on delivery; idempotency derived from source info.
// Rejections route back to source aggregate.
message AngzarrDeferredSequence {
  Cover source = 1; // Full source aggregate (domain + root + edition) - rejection routes here
  uint32 source_seq = 2; // Sequence of the triggering event
}
// docs:end:page_header

// docs:start:event_page
message EventPage {
  PageHeader header = 1; // Sequence type and provenance
  google.protobuf.Timestamp created_at = 2;
  oneof payload {
    google.protobuf.Any event = 3;
    PayloadReference external = 4; // Claim check: payload stored externally
  }
  // Field 5 removed: FactSequence replaced by PageHeader.external_deferred

  // Two-phase commit support (Phase 1: 2PC Storage Model)
  bool committed = 6;            // false = pending 2PC, needs Confirmation; true = immediately committed
  optional string cascade_id = 7; // Groups related pending events for atomic commit/rollback (null if not in cascade)
}
// docs:end:event_page

// docs:start:aggregate_snapshot
// Snapshot of aggregate state at a given sequence number.
// State must be a protobuf Message to serialize into Any.
message Snapshot {
  uint32 sequence = 2;
  google.protobuf.Any state = 3;
  SnapshotRetention retention = 4; // Controls cleanup behavior
}
// docs:end:aggregate_snapshot

// docs:start:event_book
message EventBook {
  Cover cover = 1;
  Snapshot snapshot = 2; // Snapshot state; sequence computed by framework on persist
  repeated EventPage pages = 3;
  // Field 4 removed: correlation_id moved to Cover
  // Field 5 removed: snapshot_state unified into snapshot field
  uint32 next_sequence = 6; // Computed on load, never stored: (last page seq OR snapshot seq if no pages) + 1
}
// docs:end:event_book

// Request wrapper for event operations (fact injection).
// Adds execution metadata (sync_mode, route_to_handler) to EventBook.
message EventRequest {
  EventBook events = 1;
  SyncMode sync_mode = 2;
  // For fact injection: when true (default), invokes command handler's handle_fact for
  // validation/error checking before persistence. Facts cannot be rejected, but
  // the handler can validate data integrity and log warnings.
  // When false, facts are persisted directly without handler involvement.
  bool route_to_handler = 3;
}

message Projection {
  Cover cover = 1;
  string projector = 2;
  uint32 sequence = 3;
  google.protobuf.Any projection = 4;
}

message CommandPage {
  PageHeader header = 1; // Sequence type and provenance
  MergeStrategy merge_strategy = 2;
  oneof payload {
    google.protobuf.Any command = 3;
    PayloadReference external = 4; // Claim check: payload stored externally
  }
}

message CommandBook {
  Cover cover = 1;
  repeated CommandPage pages = 2;
  // Field 3 removed: correlation_id moved to Cover
  // Field 4 removed: saga_origin moved to PageHeader.angzarr_deferred
  // Field 5 removed: 'fact' was unused
}

// Request wrapper for command operations.
// Adds execution metadata (sync_mode, cascade_error_mode) to CommandBook.
message CommandRequest {
  CommandBook command = 1;
  SyncMode sync_mode = 2;
  CascadeErrorMode cascade_error_mode = 3; // How to handle saga/PM errors in CASCADE mode
  optional string cascade_id = 4;          // If set, enables 2PC: events written with committed=false
}

message ContextualCommand {
  // Passed from aggregate coordinator to aggregate, consists of everything needed to execute/evaluate the command
  EventBook events = 1;
  CommandBook command = 2;
}

// Request wrapper for contextual command operations (internal use).
// Adds execution metadata (sync_mode) to ContextualCommand.
message ContextualCommandRequest {
  ContextualCommand command = 1;
  SyncMode sync_mode = 2;
}

// Query types
message SequenceRange {
  uint32 lower = 1;
  optional uint32 upper = 2; // If not set, query to latest
}

message SequenceSet {
  repeated uint32 values = 1;
}

// Temporal query: retrieve aggregate state at a point in history.
// Replays events from sequence 0 (no snapshots) to the specified point.
message TemporalQuery {
  oneof point_in_time {
    google.protobuf.Timestamp as_of_time = 1; // Events with created_at <= this
    uint32 as_of_sequence = 2; // Events with sequence <= this
  }
}

message Query {
  // Cover identifies the aggregate: domain + (root | correlation_id | both)
  // Query by root: Cover { domain, root }
  // Query by correlation: Cover { domain, correlation_id }
  Cover cover = 1;
  // Field 2 removed: now use cover.root
  oneof selection {
    SequenceRange range = 3;
    SequenceSet sequences = 4;
    TemporalQuery temporal = 5;
  }
}

message AggregateRoot {
  string domain = 1;
  UUID root = 2;
}

// docs:start:event_stream_filter
// Subscription filter for event streaming
message EventStreamFilter {
  string correlation_id = 1;
}
// docs:end:event_stream_filter

// SagaCommandOrigin removed - replaced by AngzarrDeferredSequence in PageHeader
// - triggering_aggregate → PageHeader.angzarr_deferred.source
// - triggering_event_sequence → PageHeader.angzarr_deferred.source_seq
// - saga_name removed (source aggregate handles compensation)

// ============================================================================
// Notifications - Non-persisted messages for signaling
// ============================================================================
//
// Notifications differ from Events in key ways:
// - NOT persisted to event store (ephemeral)
// - NO sequence numbers (not ordered within an aggregate)
// - NO event sourcing replay (fire-and-forget)
// - Used for: compensation signals, real-time alerts, system warnings
//
// Notifications reuse Cover for routing (domain, root, correlation_id) but
// lack EventPage's sequence semantics.

// docs:start:notification
// Base notification message for transient system signals.
// Contains routing info via Cover but no persistence semantics.
// Type discrimination via payload.type_url (standard Any behavior).
message Notification {
  Cover cover = 1; // Routing: domain, root, correlation_id
  google.protobuf.Any payload = 2; // Type-specific content (RejectionNotification, etc.)
  google.protobuf.Timestamp sent_at = 3; // When notification was created
  map<string, string> metadata = 4; // Optional key-value metadata
}
// docs:end:notification

// docs:start:rejection_notification
// Notification payload for command rejection scenarios.
// Embedded in Notification.payload when a saga/PM command is rejected.
//
// Source info for compensation is in rejected_command.pages[].header.angzarr_deferred:
// - source.domain, source.root, source.edition → where to route rejection
// - source_seq → which event triggered the command
message RejectionNotification {
  CommandBook rejected_command = 1; // The command that was rejected (full context)
  string rejection_reason = 2; // Why: "insufficient_funds", "out_of_stock", etc.
  // Fields 3-6 removed: source info now in rejected_command.pages[].header.angzarr_deferred
}
// docs:end:rejection_notification

// ============================================================================
// Two-Phase Commit Framework Events
// ============================================================================
//
// These framework events control 2PC commit/rollback semantics.
// They are persisted to the event stream but filtered to NoOp at read time.
// Business logic never sees these directly - they affect event visibility.

// docs:start:confirmation
// Confirms pending events - makes them visible to business logic.
// Written by framework when all sagas in a cascade succeed.
message Confirmation {
  Cover target = 1;               // Domain + root of aggregate being confirmed
  repeated uint32 sequences = 2;  // Explicit list of sequences being confirmed
  string cascade_id = 3;          // Set for cascade commits, empty for general confirmation
}
// docs:end:confirmation

// docs:start:revocation
// Revokes events - marks them as NoOp at read time.
// Written by framework on cascade failure, timeout, or explicit revocation API.
// Original events become invisible to business logic.
message Revocation {
  Cover target = 1;               // Domain + root of aggregate being revoked
  repeated uint32 sequences = 2;  // Sequences being revoked
  string cascade_id = 3;          // Set for cascade rollbacks, empty for general revocation
  string reason = 4;              // "saga_failed", "timeout", "compensation", etc.
}
// docs:end:revocation

// docs:start:compensate
// Routes to client compensation handler - original events remain visible.
// Unlike Revocation, this triggers client-implemented inverse logic.
// The Compensate marker itself is filtered to NoOp; original events stay visible.
message Compensate {
  Cover target = 1;               // Domain + root of aggregate
  repeated uint32 sequences = 2;  // Sequences to compensate
  string reason = 3;              // Why compensation is needed
}
// docs:end:compensate

// docs:start:noop
// Placeholder returned by coordinator for uncommitted/framework events.
// Never persisted - only returned at read time for filtered events.
message NoOp {
  uint32 original_sequence = 1;   // Sequence of the filtered event
  string cascade_id = 2;          // Which cascade it belonged to (if pending)
  string reason = 3;              // "uncommitted", "revoked", "framework_event"
}
// docs:end:noop

// docs:start:cascade_commit
// PM/coordinator emits to commit all uncommitted events for a cascade.
// Framework distributes Confirmation to all participants.
message CascadeCommit {
  string cascade_id = 1;
}
// docs:end:cascade_commit

// docs:start:cascade_rollback
// PM/coordinator emits to rollback all uncommitted events for a cascade.
// Framework distributes Revocation to all participants.
message CascadeRollback {
  string cascade_id = 1;
  string reason = 2;
}
// docs:end:cascade_rollback

// docs:start:cascade_conflict_detail
// Error detail for conflict rejection when overlapping fields are locked.
message CascadeConflictDetail {
  repeated string cascade_ids = 1;       // Cascades holding locks
  repeated string overlapping_fields = 2; // Fields that conflict
}
// docs:end:cascade_conflict_detail

// ============================================================================
// Dead Letter Queue (DLQ) Messages
// ============================================================================

// docs:start:dlq_details
// Sequence mismatch details for DLQ entries.
// Contains expected vs actual sequence for debugging and replay.
message SequenceMismatchDetails {
  uint32 expected_sequence = 1; // What the command expected
  uint32 actual_sequence = 2; // What the aggregate was at
  MergeStrategy merge_strategy = 3; // Strategy that triggered DLQ routing
}

// Event processing failure details for DLQ entries.
// Contains information about why a saga/projector failed to process events.
message EventProcessingFailedDetails {
  string error = 1; // Error message from the handler
  uint32 retry_count = 2; // Number of retry attempts before DLQ routing
  bool is_transient = 3; // Whether the failure is considered transient
}

// Payload retrieval failure details for DLQ entries.
// Contains information about why an externally stored payload couldn't be retrieved.
message PayloadRetrievalFailedDetails {
  PayloadStorageType storage_type = 1; // Storage backend type
  string uri = 2; // URI of the payload that couldn't be retrieved
  bytes content_hash = 3; // Content hash for identification
  uint64 original_size = 4; // Original payload size in bytes
  string error = 5; // Error message from the retrieval attempt
}
// docs:end:dlq_details

// docs:start:dead_letter
// Dead letter queue entry for failed messages requiring manual intervention.
// Per-domain topics: angzarr.dlq.{domain}
message AngzarrDeadLetter {
  Cover cover = 1; // Routing: domain, root, correlation_id
  oneof payload {
    CommandBook rejected_command = 2; // Command that failed
    EventBook rejected_events = 9; // Events that failed (saga/projector failures)
  }
  string rejection_reason = 3; // Human-readable reason
  oneof rejection_details {
    SequenceMismatchDetails sequence_mismatch = 12; // Sequence conflict details
    EventProcessingFailedDetails event_processing_failed = 13; // Handler failure details
    PayloadRetrievalFailedDetails payload_retrieval_failed = 14; // Payload store failure details
  }
  google.protobuf.Timestamp occurred_at = 7;
  map<string, string> metadata = 8; // Additional context
  string source_component = 10; // Which component sent to DLQ
  string source_component_type = 11; // "aggregate" | "saga" | "projector" | "process_manager"
}
// docs:end:dead_letter

// ============================================================================
// Component Descriptors - Self-description for topology discovery
// ============================================================================

// Describes what a component subscribes to.
// Topology edges derived from inputs: if A subscribes to domain X, edge X→A exists.
message Target {
  string domain = 1;
}

// Component self-description.
message ComponentDescriptor {
  string name = 1;
  string component_type = 2;
  repeated Target inputs = 3; // Domains I subscribe to (event types I consume)
}

// Request for GetDescriptor RPC.
message GetDescriptorRequest {}
