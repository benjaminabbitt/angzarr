name: Release

on:
  push:
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/angzarr

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # Validate the release
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"

      - name: Verify VERSION file matches tag
        run: |
          FILE_VERSION=$(cat VERSION)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Verify Cargo.toml version
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Verify proto version
        run: |
          BUF_VERSION=$(grep '^version:' proto/buf_version.yaml | awk '{print $2}')
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$BUF_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: proto/buf_version.yaml ($BUF_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

  # Publish protos to Buf Schema Registry
  publish-protos:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint and build protos
        run: |
          buf lint proto/
          buf build proto/

      - name: Push to Buf Schema Registry
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          buf push proto/ --label "$VERSION"

  # Build and push base/language images first
  build-base-images:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base/language images
        run: |
          cd build/images
          skaffold build --push

  # Build and push coordinator images
  build-containers:
    needs: [validate, build-base-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push coordinator images
        run: |
          # Force no cache to avoid stale layers
          skaffold build --push --file-output=build.json --cache-artifacts=false

      - name: Tag images with semver versions
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          IMAGES=$(jq -r '.builds[].tag' build.json)
          for FULL_TAG in $IMAGES; do
            IMAGE_NAME=$(echo "$FULL_TAG" | cut -d: -f1)
            echo "Tagging $IMAGE_NAME with semver versions"
            docker pull "$FULL_TAG"
            docker tag "$FULL_TAG" "$IMAGE_NAME:$VERSION"
            docker tag "$FULL_TAG" "$IMAGE_NAME:$MINOR"
            docker tag "$FULL_TAG" "$IMAGE_NAME:$MAJOR"
            docker push "$IMAGE_NAME:$VERSION"
            docker push "$IMAGE_NAME:$MINOR"
            docker push "$IMAGE_NAME:$MAJOR"
          done

  # Package and publish Helm chart
  publish-helm:
    needs: [validate, build-containers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Update Chart.yaml version and appVersion
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          sed -i "s/^version: .*/version: $VERSION/" deploy/k8s/helm/angzarr/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"$VERSION\"/" deploy/k8s/helm/angzarr/Chart.yaml

      - name: Update image tags in values.yaml
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          sed -i "s/tag: \"latest\"/tag: \"$VERSION\"/" deploy/k8s/helm/angzarr/values.yaml

      - name: Package Helm chart
        run: |
          helm package deploy/k8s/helm/angzarr

      - name: Push Helm chart to OCI registry
        run: |
          helm push angzarr-*.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts

  # Create GitHub release
  create-release:
    needs: [validate, publish-helm, publish-protos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ needs.validate.outputs.version }}
          cat << 'EOF' > release-notes.md
          ## Installation

          ### Helm Chart (Recommended)

          ```bash
          helm install angzarr oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/angzarr --version $VERSION
          ```

          ### Container Images

          ```bash
          # Pull individual images
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-aggregate:$VERSION
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-projector:$VERSION
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-saga:$VERSION
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-process-manager:$VERSION
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-stream:$VERSION
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-log:$VERSION
          ```

          ### OpenTofu/Terraform Modules

          ```hcl
          module "database" {
            source = "github.com/${{ github.repository }}//deploy/tofu/modules/database?ref=v$VERSION"
            type   = "mongodb"  # or "postgresql"
          }

          module "messaging" {
            source = "github.com/${{ github.repository }}//deploy/tofu/modules/messaging?ref=v$VERSION"
            type   = "rabbitmq"  # or "kafka"
          }
          ```

          ## Artifacts

          | Artifact | Location |
          |----------|----------|
          | Protos (BSR) | `buf.build/angzarr/angzarr:$VERSION` |
          | Helm Chart | `oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/angzarr:$VERSION` |
          | aggregate | `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-aggregate:$VERSION` |
          | projector | `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-projector:$VERSION` |
          | saga | `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-saga:$VERSION` |
          | process-manager | `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-process-manager:$VERSION` |
          | stream | `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-stream:$VERSION` |
          | log | `${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-log:$VERSION` |
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
