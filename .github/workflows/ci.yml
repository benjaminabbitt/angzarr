name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/angzarr-io

permissions:
  contents: read
  packages: write

jobs:
  # =============================================================================
  # STAGE 1: BUILD TOOLING IMAGES
  # =============================================================================

  build-images:
    name: Build Rust Image
    runs-on: ubuntu-latest
    outputs:
      rust-tag: ${{ steps.tags.outputs.rust-tag }}
      base-tag: ${{ steps.tags.outputs.base-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push rust image
        run: |
          cd build/images
          skaffold build --push --file-output=build.json

      - name: Extract image tags
        id: tags
        run: |
          cd build/images
          BASE_TAG=$(jq -r '.builds[] | select(.imageName | contains("angzarr-base")) | .tag' build.json)
          RUST_TAG=$(jq -r '.builds[] | select(.imageName | contains("angzarr-rust")) | .tag' build.json)
          echo "base-tag=$BASE_TAG" >> $GITHUB_OUTPUT
          echo "rust-tag=$RUST_TAG" >> $GITHUB_OUTPUT
          echo "Built: base=$BASE_TAG rust=$RUST_TAG"

      - name: Tag images as latest
        if: github.ref == 'refs/heads/main'
        run: |
          cd build/images
          for FULL_TAG in $(jq -r '.builds[].tag' build.json); do
            IMAGE_NAME=$(echo "$FULL_TAG" | cut -d: -f1)
            echo "Tagging $IMAGE_NAME:latest"
            docker pull "$FULL_TAG"
            docker tag "$FULL_TAG" "$IMAGE_NAME:latest"
            docker push "$IMAGE_NAME:latest"
          done

  # =============================================================================
  # STAGE 2: TESTS (parallel)
  # =============================================================================

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Rust formatting
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ needs.build-images.outputs.rust-tag }} \
            just -f justfile.container fmt

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clippy
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ needs.build-images.outputs.rust-tag }} \
            just -f justfile.container lint

      - name: Buf lint
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/angzarr-project/proto \
            ${{ needs.build-images.outputs.rust-tag }} \
            buf lint

      - name: Buf breaking changes
        if: github.event_name == 'pull_request'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/angzarr-project/proto \
            ${{ needs.build-images.outputs.rust-tag }} \
            buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main'
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ needs.build-images.outputs.rust-tag }} \
            just -f justfile.container test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Note: Binary integration tests require binaries built first, run separately
      - name: Run SQLite storage contract tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ needs.build-images.outputs.rust-tag }} \
            just -f justfile.container test-storage-sqlite

      - name: Run config integration tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ needs.build-images.outputs.rust-tag }} \
            just -f justfile.container test-config

      - name: Run gRPC connection tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ needs.build-images.outputs.rust-tag }} \
            just -f justfile.container test-grpc

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run coverage (unit + contract tests)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ needs.build-images.outputs.rust-tag }} \
            just -f justfile.container cov-ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: codecov.json
          retention-days: 30

  mutation:
    name: Mutation Tests (Changed Code)
    runs-on: ubuntu-latest
    needs: [build-images, test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate diff
        run: |
          git diff origin/${{ github.base_ref }}..HEAD > git.diff
          echo "Diff stats:"
          wc -l git.diff

      - name: Run mutation tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ needs.build-images.outputs.rust-tag }} \
            just -f justfile.container mutants-ci
        continue-on-error: true

      - name: Upload mutation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-results
          path: mutants.out/
          retention-days: 7

  # =============================================================================
  # TEST GATE
  # =============================================================================

  test-gate:
    name: Test Gate
    runs-on: ubuntu-latest
    needs: [format, lint, test, integration, coverage]
    if: always()
    outputs:
      passed: ${{ steps.check.outputs.passed }}
    steps:
      - name: Check test results
        id: check
        run: |
          echo "Format: ${{ needs.format.result }}"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Integration: ${{ needs.integration.result }}"
          echo "Coverage: ${{ needs.coverage.result }}"

          if [ "${{ needs.format.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ] || \
             [ "${{ needs.coverage.result }}" != "success" ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "::error::One or more tests failed"
            exit 1
          fi
          echo "passed=true" >> $GITHUB_OUTPUT
          echo "All tests passed"

  # =============================================================================
  # STAGE 3: BUILD & PUSH COORDINATOR IMAGES
  # =============================================================================

  build-push-images:
    name: Build & Push Coordinator Images
    runs-on: ubuntu-latest
    needs: [test-gate, build-images]
    if: needs.test-gate.outputs.passed == 'true'
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      images-json: ${{ steps.images-json.outputs.json }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          else
            TAG="${SHORT_SHA}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $TAG"

      - name: Build coordinator images with skaffold
        run: |
          skaffold build --push --file-output=build.json

      - name: Tag images with PR/main tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          IMAGES=$(jq -r '.builds[].tag' build.json)

          for FULL_TAG in $IMAGES; do
            IMAGE_NAME=$(echo "$FULL_TAG" | cut -d: -f1)
            echo "Tagging $IMAGE_NAME:$TAG"
            docker pull "$FULL_TAG"
            docker tag "$FULL_TAG" "$IMAGE_NAME:$TAG"
            docker push "$IMAGE_NAME:$TAG"

            # Also tag as latest on main
            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              docker tag "$FULL_TAG" "$IMAGE_NAME:latest"
              docker push "$IMAGE_NAME:latest"
            fi
          done

      - name: Generate images JSON for acceptance tests
        id: images-json
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          JSON=$(cat <<EOF
          {
            "aggregate": "${{ env.IMAGE_PREFIX }}/angzarr-aggregate:${TAG}",
            "saga": "${{ env.IMAGE_PREFIX }}/angzarr-saga:${TAG}",
            "projector": "${{ env.IMAGE_PREFIX }}/angzarr-projector:${TAG}",
            "process-manager": "${{ env.IMAGE_PREFIX }}/angzarr-process-manager:${TAG}",
            "stream": "${{ env.IMAGE_PREFIX }}/angzarr-stream:${TAG}",
            "gateway": "${{ env.IMAGE_PREFIX }}/angzarr-grpc-gateway:${TAG}",
            "log": "${{ env.IMAGE_PREFIX }}/angzarr-log:${TAG}"
          }
          EOF
          )
          echo "json=$(echo "$JSON" | jq -c '.')" >> $GITHUB_OUTPUT

      - name: Output built images
        run: |
          echo "## Built Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          TAG="${{ steps.tag.outputs.tag }}"
          jq -r '.builds[].imageName' build.json | while read IMAGE; do
            echo "| $IMAGE | $TAG |" >> $GITHUB_STEP_SUMMARY
          done

  # =============================================================================
  # STAGE 4: ACCEPTANCE TESTS (via examples repo)
  # =============================================================================

  acceptance:
    name: Acceptance Tests
    needs: [build-push-images]
    if: needs.build-push-images.result == 'success'
    uses: angzarr-io/angzarr-examples-rust/.github/workflows/acceptance-callable.yml@main
    with:
      # Use just-built coordinator images
      coordinator-version: ${{ needs.build-push-images.outputs.tag }}
      # Use latest example images (or matching branch if exists)
      example-images: '{}'
      examples-ref: ${{ github.head_ref || 'main' }}

  # =============================================================================
  # STAGE 5: PUBLISH HELM CHARTS (main branch only)
  # =============================================================================

  publish-charts:
    name: Publish Helm Charts
    runs-on: ubuntu-latest
    needs: [test-gate]
    if: github.ref == 'refs/heads/main' && needs.test-gate.outputs.passed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push charts
        run: |
          cd deploy/k8s/helm
          for dir in angzarr postgres-simple rabbitmq-simple; do
            echo "Packaging $dir..."
            # helm package outputs: "Successfully packaged chart and saved it to: /path/to/chart-x.y.z.tgz"
            output=$(helm package "$dir")
            tgz=$(echo "$output" | grep -oP '(?<=saved it to: ).*\.tgz')
            echo "Pushing $tgz to OCI registry..."
            helm push "$tgz" oci://ghcr.io/angzarr-io/charts
          done

      - name: Summary
        run: |
          echo "## Published Helm Charts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Charts published to \`oci://ghcr.io/angzarr-io/charts/\`:" >> $GITHUB_STEP_SUMMARY
          echo "- angzarr" >> $GITHUB_STEP_SUMMARY
          echo "- angzarr-db-postgres-simple" >> $GITHUB_STEP_SUMMARY
          echo "- angzarr-mq-rabbitmq-simple" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # SUMMARY
  # =============================================================================

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [build-push-images, mutation, acceptance, publish-charts]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push Images | ${{ needs.build-push-images.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mutation Tests | ${{ needs.mutation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Acceptance Tests | ${{ needs.acceptance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish Charts | ${{ needs.publish-charts.result }} |" >> $GITHUB_STEP_SUMMARY
