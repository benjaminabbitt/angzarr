name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/angzarr-io

jobs:
  # Build base image first - language images depend on this
  build-base:
    name: Build Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      base-tag: ${{ steps.build.outputs.base-tag }}
      base-hash: ${{ steps.build.outputs.base-hash }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        id: build
        run: |
          cd build/images
          skaffold build -f skaffold-base.yaml --push --file-output=base-build.json
          BASE_TAG=$(jq -r '.builds[0].tag' base-build.json)
          BASE_HASH=$(echo "$BASE_TAG" | sed 's/.*://')
          echo "base-tag=$BASE_TAG" >> $GITHUB_OUTPUT
          echo "base-hash=$BASE_HASH" >> $GITHUB_OUTPUT

  # Build Rust image (other language images are built in their respective repos)
  build-rust:
    name: Build Rust Image
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      contents: read
      packages: write
    outputs:
      rust-tag: ${{ steps.output.outputs.rust-tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate content hash
        id: hash
        run: |
          CONTENT_HASH=$(sha256sum build/images/rust/Containerfile | cut -c1-12)
          TAG="${CONTENT_HASH}-${{ needs.build-base.outputs.base-hash }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect ${{ env.IMAGE_PREFIX }}/angzarr-rust:${{ steps.hash.outputs.tag }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push rust image
        id: build
        run: |
          TAG="${{ steps.hash.outputs.tag }}"
          IMAGE="${{ env.IMAGE_PREFIX }}/angzarr-rust:$TAG"
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "Image already exists, skipping build"
          else
            docker build \
              --build-arg BASE_IMAGE=${{ needs.build-base.outputs.base-tag }} \
              -t "$IMAGE" \
              -f build/images/rust/Containerfile \
              build/images/rust
            docker push "$IMAGE"
          fi
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Set output
        id: output
        run: |
          echo "rust-tag=${{ steps.build.outputs.image }}" >> $GITHUB_OUTPUT

  # Downstream jobs use the built images
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: build-base
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: docker pull ${{ needs.build-base.outputs.base-tag }}

      - name: Buf lint
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace:ro" \
            -w /workspace/proto \
            ${{ needs.build-base.outputs.base-tag }} \
            buf lint

      - name: Buf build
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace:ro" \
            -w /workspace/proto \
            ${{ needs.build-base.outputs.base-tag }} \
            buf build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build-base, build-rust]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate rust tag
        id: rust
        run: |
          CONTENT_HASH=$(sha256sum build/images/rust/Containerfile | cut -c1-12)
          TAG="${CONTENT_HASH}-${{ needs.build-base.outputs.base-hash }}"
          echo "tag=${{ env.IMAGE_PREFIX }}/angzarr-rust:$TAG" >> $GITHUB_OUTPUT

      - name: Pull rust image
        run: docker pull ${{ steps.rust.outputs.tag }}

      - name: Run tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ steps.rust.outputs.tag }} \
            cargo test --lib

  gateway:
    name: Build gRPC Gateway
    runs-on: ubuntu-latest
    needs: build-base
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate go tag
        id: go
        run: |
          CONTENT_HASH=$(sha256sum build/images/go/Containerfile | cut -c1-12)
          TAG="${CONTENT_HASH}-${{ needs.build-base.outputs.base-hash }}"
          echo "tag=${{ env.IMAGE_PREFIX }}/angzarr-go:$TAG" >> $GITHUB_OUTPUT

      - name: Pull go image
        run: docker pull ${{ steps.go.outputs.tag }}

      - name: Generate gateway code
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/gateway \
            ${{ steps.go.outputs.tag }} \
            buf generate

      - name: Build gateway binary
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/gateway \
            ${{ steps.go.outputs.tag }} \
            go build -buildvcs=false -o /tmp/angzarr-grpc-gateway .

      - name: Generate OpenAPI spec
        run: |
          mkdir -p docs/static
          cp gateway/api/angzarr.swagger.json docs/static/openapi.json

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/static/openapi.json

  # Build runtime images (angzarr binaries) using skaffold
  build-runtime:
    name: Build Runtime Images
    runs-on: ubuntu-latest
    needs: [build-base, build-rust]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate rust image tag
        id: rust
        run: |
          CONTENT_HASH=$(sha256sum build/images/rust/Containerfile | cut -c1-12)
          TAG="${CONTENT_HASH}-${{ needs.build-base.outputs.base-hash }}"
          echo "tag=${{ env.IMAGE_PREFIX }}/angzarr-rust:$TAG" >> $GITHUB_OUTPUT

      - name: Pull rust image
        run: docker pull ${{ steps.rust.outputs.tag }}

      - name: Build runtime images with skaffold
        env:
          RUST_IMAGE: ${{ steps.rust.outputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            skaffold build --push --file-output=runtime-build.json
          else
            skaffold build --push=false --file-output=runtime-build.json
          fi
          echo "Built images:"
          jq -r '.builds[].tag' runtime-build.json

  # NOTE: Client library and example builds have been moved to their respective repos:
  # - angzarr-client-{rust,python,go,java,csharp,cpp}
  # - angzarr-examples-{rust,python,go,java,csharp,cpp}

  push-gateway:
    name: Push Gateway Image
    runs-on: ubuntu-latest
    needs: [build-base, build-rust, lint, test, gateway]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate go tag
        id: go
        run: |
          CONTENT_HASH=$(sha256sum build/images/go/Containerfile | cut -c1-12)
          TAG="${CONTENT_HASH}-${{ needs.build-base.outputs.base-hash }}"
          echo "tag=${{ env.IMAGE_PREFIX }}/angzarr-go:$TAG" >> $GITHUB_OUTPUT

      - name: Pull go image
        run: docker pull ${{ steps.go.outputs.tag }}

      - name: Generate gateway code
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/gateway \
            ${{ steps.go.outputs.tag }} \
            buf generate

      - name: Build gateway image
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}/angzarr-grpc-gateway:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/angzarr-grpc-gateway:latest \
            -f gateway/Containerfile .

      - name: Push gateway image
        run: |
          docker push ${{ env.IMAGE_PREFIX }}/angzarr-grpc-gateway:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/angzarr-grpc-gateway:latest
