name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/angzarr-io

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/angzarr-io/angzarr-base:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      # buf-lint/buf-build use _buf which detects buf in PATH and runs directly
      - run: just buf-lint
      - run: just buf-build

  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/angzarr-io/angzarr-rust:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      # Mount container justfile - just test calls _container which dispatches here
      - run: ln -sf justfile.container justfile
      - run: just test

  gateway:
    name: Build gRPC Gateway
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/angzarr-io/angzarr-go:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      # gateway-* targets run commands directly (no container delegation)
      - run: just gateway-gen
      - run: just gateway-build
      - run: just openapi
      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: docs/static/openapi.json

  images:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [lint, test, gateway]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        run: just gateway-image-push ${{ github.sha }}
