name: Cleanup PR Images

on:
  pull_request:
    types: [closed]
  schedule:
    # Weekly cleanup of orphaned PR images
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  packages: write

jobs:
  # Delete images for closed PR
  cleanup-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - angzarr-aggregate
          - angzarr-projector
          - angzarr-saga
          - angzarr-process-manager
          - angzarr-log
          - angzarr-stream
          - angzarr-grpc-gateway
    steps:
      - name: Delete PR images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.image }}
          package-type: container
          delete-only-pre-release-versions: true
          min-versions-to-keep: 0
          ignore-versions: '^(?!pr-${{ github.event.pull_request.number }}-)'
        continue-on-error: true

  # Weekly: delete untagged and old PR images
  cleanup-scheduled:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - angzarr-aggregate
          - angzarr-projector
          - angzarr-saga
          - angzarr-process-manager
          - angzarr-log
          - angzarr-stream
          - angzarr-grpc-gateway
          - angzarr-rust
          - angzarr-go
          - angzarr-base
    steps:
      - name: Delete untagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.image }}
          package-type: container
          delete-only-untagged-versions: true
        continue-on-error: true

      - name: Delete old PR versions (>14 days)
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.image }}
          package-type: container
          min-versions-to-keep: 10
          ignore-versions: '^v?\d+\.\d+\.\d+$|^latest$|^\d+\.\d+$|^\d+$'
        continue-on-error: true
