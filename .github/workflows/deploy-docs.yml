name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'proto/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate proto documentation
        run: |
          mkdir -p docs/docs/api/proto
          PROTOS=$(find proto -name '*.proto' ! -path '*/health/*' -printf '%P\n' | sort)
          docker run --rm \
            -v "${{ github.workspace }}/proto:/protos" \
            -v "${{ github.workspace }}/docs/docs/api/proto:/out" \
            pseudomuto/protoc-gen-doc \
            --proto_path=/protos \
            --doc_opt=markdown,index.md \
            $PROTOS
          # Escape curly braces for MDX compatibility
          sed -i 's/{\([^}]*\)}/`{\1}`/g' docs/docs/api/proto/index.md
          # Add frontmatter
          sed -i '1i ---\ntitle: Protocol Buffer API\ndescription: Auto-generated documentation for Angzarr protobuf definitions\n---\n' docs/docs/api/proto/index.md

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build documentation
        working-directory: docs
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
