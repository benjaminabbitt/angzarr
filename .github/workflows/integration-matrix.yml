name: Integration Tests (Kind)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  KIND_VERSION: v0.20.0
  KUBECTL_VERSION: v1.28.0
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/angzarr-io

permissions:
  contents: read
  packages: read

jobs:
  # Integration test for Rust (proof of concept)
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip if triggered by workflow_run and CI failed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        language: [rust]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Language-specific setup for acceptance tests
      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      # Calculate image tags to match ci.yml's content-hash scheme
      - name: Calculate image tags
        id: tags
        run: |
          BASE_HASH=$(sha256sum build/images/base/Containerfile | cut -c1-12)
          RUST_HASH=$(sha256sum build/images/rust/Containerfile | cut -c1-12)
          EXAMPLE_HASH=$(sha256sum examples/rust/Containerfile | cut -c1-12)

          RUST_TAG="${RUST_HASH}-${BASE_HASH}"

          echo "rust-tag=$RUST_TAG" >> $GITHUB_OUTPUT
          echo "example-hash=$EXAMPLE_HASH" >> $GITHUB_OUTPUT

      # Find CI workflow run ID for this commit
      - name: Find CI workflow run
        id: ci-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.workflow_run.id }}" ]; then
            # workflow_run trigger - use the triggering run
            echo "run-id=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
            echo "Using workflow_run trigger ID: ${{ github.event.workflow_run.id }}"
          else
            # pull_request trigger - find the CI run for this commit
            echo "Looking for CI workflow run for commit ${{ github.sha }}..."

            # Wait for CI to complete (up to 10 minutes)
            for i in {1..60}; do
              RUN_ID=$(gh api repos/${{ github.repository }}/actions/runs \
                --jq ".workflow_runs[] | select(.head_sha==\"${{ github.sha }}\" and .name==\"CI\" and .status==\"completed\") | .id" \
                | head -1)

              if [ -n "$RUN_ID" ]; then
                echo "Found completed CI run: $RUN_ID"
                echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT
                exit 0
              fi

              echo "CI workflow not complete yet, waiting... ($i/60)"
              sleep 10
            done

            echo "Warning: CI workflow did not complete in time"
            echo "run-id=" >> $GITHUB_OUTPUT
          fi

      # Download runtime image tags from CI workflow
      - name: Download runtime image tags
        if: steps.ci-run.outputs.run-id != ''
        uses: actions/download-artifact@v4
        with:
          name: runtime-build-tags
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.ci-run.outputs.run-id }}
        continue-on-error: true

      # Parse runtime image tags
      - name: Parse runtime image tags
        id: runtime
        run: |
          if [ -f runtime-build.json ]; then
            # Extract full image references from skaffold build output
            AGG_FULL=$(jq -r '.builds[] | select(.imageName | contains("aggregate")) | .tag' runtime-build.json)
            PRJ_FULL=$(jq -r '.builds[] | select(.imageName | contains("projector")) | .tag' runtime-build.json)
            SAG_FULL=$(jq -r '.builds[] | select(.imageName | contains("saga")) | .tag' runtime-build.json)
            PMG_FULL=$(jq -r '.builds[] | select(.imageName | contains("process-manager")) | .tag' runtime-build.json)

            # Full image references (for docker pull/kind load)
            echo "aggregate=$AGG_FULL" >> $GITHUB_OUTPUT
            echo "projector=$PRJ_FULL" >> $GITHUB_OUTPUT
            echo "saga=$SAG_FULL" >> $GITHUB_OUTPUT
            echo "process-manager=$PMG_FULL" >> $GITHUB_OUTPUT

            # Extract just the tag part (after the last colon) for Helm
            echo "aggregate-tag=${AGG_FULL##*:}" >> $GITHUB_OUTPUT
            echo "projector-tag=${PRJ_FULL##*:}" >> $GITHUB_OUTPUT
            echo "saga-tag=${SAG_FULL##*:}" >> $GITHUB_OUTPUT
            echo "process-manager-tag=${PMG_FULL##*:}" >> $GITHUB_OUTPUT

            echo "Found runtime image tags from CI workflow"
          else
            # Fallback: try to get latest from GHCR (may be stale)
            echo "Warning: runtime-build.json not found, using latest tags"
            echo "aggregate=${{ env.IMAGE_PREFIX }}/angzarr-aggregate:latest" >> $GITHUB_OUTPUT
            echo "projector=${{ env.IMAGE_PREFIX }}/angzarr-projector:latest" >> $GITHUB_OUTPUT
            echo "saga=${{ env.IMAGE_PREFIX }}/angzarr-saga:latest" >> $GITHUB_OUTPUT
            echo "process-manager=${{ env.IMAGE_PREFIX }}/angzarr-process-manager:latest" >> $GITHUB_OUTPUT
            echo "aggregate-tag=latest" >> $GITHUB_OUTPUT
            echo "projector-tag=latest" >> $GITHUB_OUTPUT
            echo "saga-tag=latest" >> $GITHUB_OUTPUT
            echo "process-manager-tag=latest" >> $GITHUB_OUTPUT
          fi

      # Pull pre-built runtime images from GHCR
      - name: Pull runtime images
        run: |
          echo "Pulling aggregate: ${{ steps.runtime.outputs.aggregate }}"
          docker pull "${{ steps.runtime.outputs.aggregate }}"

          echo "Pulling projector: ${{ steps.runtime.outputs.projector }}"
          docker pull "${{ steps.runtime.outputs.projector }}"

          echo "Pulling saga: ${{ steps.runtime.outputs.saga }}"
          docker pull "${{ steps.runtime.outputs.saga }}"

          echo "Pulling process-manager: ${{ steps.runtime.outputs.process-manager }}"
          docker pull "${{ steps.runtime.outputs.process-manager }}"

      # Pull pre-built Rust example images from GHCR
      - name: Pull Rust example images
        run: |
          TAG="${{ steps.tags.outputs.example-hash }}"
          IMAGES=(
            "${{ env.IMAGE_PREFIX }}/poker-rust-player"
            "${{ env.IMAGE_PREFIX }}/poker-rust-table"
            "${{ env.IMAGE_PREFIX }}/poker-rust-hand"
            "${{ env.IMAGE_PREFIX }}/poker-rust-saga-table-hand"
            "${{ env.IMAGE_PREFIX }}/poker-rust-saga-table-player"
            "${{ env.IMAGE_PREFIX }}/poker-rust-saga-hand-table"
            "${{ env.IMAGE_PREFIX }}/poker-rust-saga-hand-player"
            "${{ env.IMAGE_PREFIX }}/poker-rust-pmg-hand-flow"
            "${{ env.IMAGE_PREFIX }}/poker-rust-prj-output"
          )
          for img in "${IMAGES[@]}"; do
            echo "Pulling $img:$TAG..."
            docker pull "$img:$TAG" || echo "Warning: Could not pull $img:$TAG"
          done

      # Create Kind cluster
      - name: Create Kind cluster
        run: |
          kind create cluster --config kind-config.yaml --name angzarr
          kubectl cluster-info

      # Load images into Kind
      - name: Load runtime images into Kind
        run: |
          echo "Loading aggregate: ${{ steps.runtime.outputs.aggregate }}"
          kind load docker-image "${{ steps.runtime.outputs.aggregate }}" --name angzarr

          echo "Loading projector: ${{ steps.runtime.outputs.projector }}"
          kind load docker-image "${{ steps.runtime.outputs.projector }}" --name angzarr

          echo "Loading saga: ${{ steps.runtime.outputs.saga }}"
          kind load docker-image "${{ steps.runtime.outputs.saga }}" --name angzarr

          echo "Loading process-manager: ${{ steps.runtime.outputs.process-manager }}"
          kind load docker-image "${{ steps.runtime.outputs.process-manager }}" --name angzarr

      - name: Load Rust example images into Kind
        run: |
          TAG="${{ steps.tags.outputs.example-hash }}"
          IMAGES=(player table hand saga-table-hand saga-table-player saga-hand-table saga-hand-player pmg-hand-flow prj-output)
          for img in "${IMAGES[@]}"; do
            IMG="${{ env.IMAGE_PREFIX }}/poker-rust-$img:$TAG"
            echo "Loading $IMG..."
            kind load docker-image "$IMG" --name angzarr || echo "Warning: Could not load $IMG"
          done

      # Install RabbitMQ operator (required for RabbitmqCluster CRD)
      - name: Install RabbitMQ operator
        run: |
          kubectl apply -f https://github.com/rabbitmq/cluster-operator/releases/latest/download/cluster-operator.yml
          kubectl wait --for=condition=available deployment/rabbitmq-cluster-operator \
            -n rabbitmq-system --timeout=120s

      # Deploy infrastructure (RabbitMQ, Redis)
      - name: Deploy infrastructure
        run: just infra-ci

      # Deploy Rust services via Helm
      - name: Deploy Rust services via Helm
        env:
          TAG: ${{ steps.tags.outputs.example-hash }}
        run: |
          helm upgrade --install poker-rust deploy/k8s/helm/angzarr \
            -n angzarr \
            -f examples/rust/values.yaml \
            --set amqp.enabled=true \
            --set amqp.url="amqp://angzarr:angzarr@angzarr-mq-rabbitmq:5672" \
            --set storage.type=sqlite \
            --set images.aggregate.repository=${{ env.IMAGE_PREFIX }}/angzarr-aggregate \
            --set images.aggregate.tag=${{ steps.runtime.outputs.aggregate-tag }} \
            --set images.projector.repository=${{ env.IMAGE_PREFIX }}/angzarr-projector \
            --set images.projector.tag=${{ steps.runtime.outputs.projector-tag }} \
            --set images.saga.repository=${{ env.IMAGE_PREFIX }}/angzarr-saga \
            --set images.saga.tag=${{ steps.runtime.outputs.saga-tag }} \
            --set images.process-manager.repository=${{ env.IMAGE_PREFIX }}/angzarr-process-manager \
            --set images.process-manager.tag=${{ steps.runtime.outputs.process-manager-tag }} \
            --set "applications.business[0].image.tag=${TAG}" \
            --set "applications.business[1].image.tag=${TAG}" \
            --set "applications.business[2].image.tag=${TAG}" \
            --wait --timeout 5m

      - name: Wait for pods to be ready
        run: |
          echo "Waiting for pods to be ready..."
          kubectl get pods -n angzarr
          kubectl wait --for=condition=ready pod \
            -l angzarr.io/component \
            -n angzarr \
            --timeout=300s || true
          echo "Final pod status:"
          kubectl get pods -n angzarr

      # Run acceptance tests
      - name: Run acceptance tests
        run: |
          cd examples/rust
          just test-acceptance
        env:
          DEVCONTAINER: "true"
          ANGZARR_TEST_MODE: direct
          ANGZARR_ENDPOINT: "localhost:9084"

      # Collect logs on failure
      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n angzarr -o wide
          echo ""
          echo "=== Events ==="
          kubectl get events -n angzarr --sort-by='.lastTimestamp' | tail -50
          echo ""
          echo "=== Pod Descriptions ==="
          kubectl describe pods -n angzarr
          echo ""
          echo "=== All Container Logs ==="
          for pod in $(kubectl get pods -n angzarr -o name); do
            echo "--- $pod ---"
            kubectl logs "$pod" -n angzarr --all-containers --tail=100 || true
          done

      # Cleanup
      - name: Delete Kind cluster
        if: always()
        run: kind delete cluster --name angzarr || true

  # Aggregate results
  test-results:
    needs: integration-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.integration-test.result }}" == "failure" ]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.integration-test.result }}" == "skipped" ]; then
            echo "Integration tests were skipped (CI workflow may have failed)"
            exit 0
          fi
          echo "All integration tests passed"
