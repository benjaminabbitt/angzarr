name: Integration Tests (Kind)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  KIND_VERSION: v0.20.0
  KUBECTL_VERSION: v1.28.0
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/angzarr-io

permissions:
  contents: read
  packages: read

jobs:
  # Integration test for Rust (proof of concept)
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Skip if triggered by workflow_run and CI failed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        language: [rust]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Language-specific setup for acceptance tests
      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      # Calculate image tags to match ci.yml's content-hash scheme
      - name: Calculate image tags
        id: tags
        run: |
          BASE_HASH=$(sha256sum build/images/base/Containerfile | cut -c1-12)
          RUST_HASH=$(sha256sum build/images/rust/Containerfile | cut -c1-12)
          EXAMPLE_HASH=$(sha256sum examples/rust/Containerfile | cut -c1-12)

          RUST_TAG="${RUST_HASH}-${BASE_HASH}"

          echo "rust-tag=$RUST_TAG" >> $GITHUB_OUTPUT
          echo "example-hash=$EXAMPLE_HASH" >> $GITHUB_OUTPUT

      # Pull pre-built runtime images from GHCR
      - name: Pull runtime images
        run: |
          IMAGES=(
            "${{ env.IMAGE_PREFIX }}/angzarr-aggregate"
            "${{ env.IMAGE_PREFIX }}/angzarr-projector"
            "${{ env.IMAGE_PREFIX }}/angzarr-saga"
            "${{ env.IMAGE_PREFIX }}/angzarr-process-manager"
          )
          for img in "${IMAGES[@]}"; do
            echo "Pulling $img..."
            # Try dev tag first (from skaffold), then latest
            docker pull "$img:dev-latest" || docker pull "$img:latest" || echo "Warning: Could not pull $img"
          done

      # Pull pre-built Rust example images from GHCR
      - name: Pull Rust example images
        run: |
          TAG="${{ steps.tags.outputs.example-hash }}"
          IMAGES=(
            "${{ env.IMAGE_PREFIX }}/poker-rust-player"
            "${{ env.IMAGE_PREFIX }}/poker-rust-table"
            "${{ env.IMAGE_PREFIX }}/poker-rust-hand"
            "${{ env.IMAGE_PREFIX }}/poker-rust-saga-table-hand"
            "${{ env.IMAGE_PREFIX }}/poker-rust-saga-table-player"
            "${{ env.IMAGE_PREFIX }}/poker-rust-saga-hand-table"
            "${{ env.IMAGE_PREFIX }}/poker-rust-saga-hand-player"
            "${{ env.IMAGE_PREFIX }}/poker-rust-pmg-hand-flow"
            "${{ env.IMAGE_PREFIX }}/poker-rust-prj-output"
          )
          for img in "${IMAGES[@]}"; do
            echo "Pulling $img:$TAG..."
            docker pull "$img:$TAG" || echo "Warning: Could not pull $img:$TAG"
          done

      # Create Kind cluster
      - name: Create Kind cluster
        run: |
          kind create cluster --config kind-config.yaml --name angzarr
          kubectl cluster-info

      # Load images into Kind
      - name: Load runtime images into Kind
        run: |
          for img in aggregate projector saga process-manager; do
            IMG="${{ env.IMAGE_PREFIX }}/angzarr-$img"
            # Try dev tag first, then latest
            kind load docker-image "$IMG:dev-latest" --name angzarr 2>/dev/null || \
            kind load docker-image "$IMG:latest" --name angzarr 2>/dev/null || \
            echo "Warning: Could not load $IMG"
          done

      - name: Load Rust example images into Kind
        run: |
          TAG="${{ steps.tags.outputs.example-hash }}"
          IMAGES=(player table hand saga-table-hand saga-table-player saga-hand-table saga-hand-player pmg-hand-flow prj-output)
          for img in "${IMAGES[@]}"; do
            IMG="${{ env.IMAGE_PREFIX }}/poker-rust-$img:$TAG"
            echo "Loading $IMG..."
            kind load docker-image "$IMG" --name angzarr || echo "Warning: Could not load $IMG"
          done

      # Install RabbitMQ operator (required for RabbitmqCluster CRD)
      - name: Install RabbitMQ operator
        run: |
          kubectl apply -f https://github.com/rabbitmq/cluster-operator/releases/latest/download/cluster-operator.yml
          kubectl wait --for=condition=available deployment/rabbitmq-cluster-operator \
            -n rabbitmq-system --timeout=120s

      # Deploy infrastructure (RabbitMQ, Redis)
      # Note: We set name=angzarr-mq-rabbitmq so the service name matches what
      # the Helm deployment templates expect in their init containers
      - name: Deploy infrastructure
        run: |
          kubectl create namespace angzarr --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install angzarr-redis deploy/k8s/helm/redis \
              -n angzarr --set auth.password=angzarr --wait --timeout 2m
          helm upgrade --install angzarr-mq deploy/k8s/helm/rabbitmq \
              -n angzarr --set auth.password=angzarr --set name=angzarr-mq-rabbitmq --wait --timeout 2m

      # Deploy Rust services via Helm
      - name: Deploy Rust services via Helm
        run: |
          helm upgrade --install poker-rust deploy/k8s/helm/angzarr \
            -n angzarr \
            -f examples/rust/values.yaml \
            --set global.imageTag=${{ steps.tags.outputs.example-hash }} \
            --set amqp.enabled=true \
            --set amqp.url="amqp://guest:guest@angzarr-mq-rabbitmq:5672" \
            --set storage.type=sqlite \
            --wait --timeout 5m

      - name: Wait for pods to be ready
        run: |
          echo "Waiting for pods to be ready..."
          kubectl get pods -n angzarr
          kubectl wait --for=condition=ready pod \
            -l angzarr.io/component \
            -n angzarr \
            --timeout=300s || true
          echo "Final pod status:"
          kubectl get pods -n angzarr

      # Run acceptance tests
      - name: Run acceptance tests
        run: |
          cd examples/rust
          just test-acceptance
        env:
          DEVCONTAINER: "true"
          ANGZARR_TEST_MODE: direct
          ANGZARR_ENDPOINT: "localhost:9084"

      # Collect logs on failure
      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n angzarr -o wide
          echo ""
          echo "=== Events ==="
          kubectl get events -n angzarr --sort-by='.lastTimestamp' | tail -50
          echo ""
          echo "=== Pod Descriptions ==="
          kubectl describe pods -n angzarr
          echo ""
          echo "=== All Container Logs ==="
          for pod in $(kubectl get pods -n angzarr -o name); do
            echo "--- $pod ---"
            kubectl logs "$pod" -n angzarr --all-containers --tail=100 || true
          done

      # Cleanup
      - name: Delete Kind cluster
        if: always()
        run: kind delete cluster --name angzarr || true

  # Aggregate results
  test-results:
    needs: integration-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.integration-test.result }}" == "failure" ]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.integration-test.result }}" == "skipped" ]; then
            echo "Integration tests were skipped (CI workflow may have failed)"
            exit 0
          fi
          echo "All integration tests passed"
