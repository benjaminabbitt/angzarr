name: Integration Tests (Matrix)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      language:
        description: 'Language to test (or "all")'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - rust
          - go
          - python
          - java
          - csharp
          - cpp
      run_mutation_tests:
        description: 'Run mutation tests'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  KIND_VERSION: v0.20.0
  KUBECTL_VERSION: v1.28.0
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/angzarr
  VERSIONATOR_VERSION: v0.0.11

permissions:
  contents: read
  packages: write

jobs:
  # =============================================================================
  # Version (using versionator)
  # =============================================================================
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for versionator

      - name: Install versionator
        run: |
          curl -sLO "https://github.com/benjaminabbitt/versionator/releases/download/${{ env.VERSIONATOR_VERSION }}/versionator-linux-amd64"
          chmod +x versionator-linux-amd64
          sudo mv versionator-linux-amd64 /usr/local/bin/versionator

      - name: Get version
        id: version
        run: |
          VERSION=$(versionator version)
          VERSION_TAG=$(versionator version --template '{{.Major}}.{{.Minor}}.{{.Patch}}{{if .PreRelease}}-{{.PreRelease}}{{end}}{{if .CommitsSinceTag}}+{{.CommitsSinceTag}}.{{.ShortCommit}}{{end}}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Version Tag: $VERSION_TAG"

  # =============================================================================
  # Build Framework
  # =============================================================================
  # Uses pre-built rust image from GHCR (built by ci.yml)
  build-framework:
    name: Build Framework
    runs-on: ubuntu-latest
    needs: version
    container: ghcr.io/${{ github.repository_owner }}/angzarr-rust:latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build framework
        run: just build-standalone

      - name: Upload framework binary
        uses: actions/upload-artifact@v4
        with:
          name: framework-binary
          path: target/release/angzarr-standalone
          retention-days: 1

  # =============================================================================
  # Mutation Testing (Core)
  # =============================================================================
  mutation-tests:
    name: Mutation Tests (Core)
    runs-on: ubuntu-latest
    needs: version
    container: ghcr.io/${{ github.repository_owner }}/angzarr-rust:latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mutation_tests == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mutants-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run full mutation tests
        run: |
          # Full mutation test run using .cargo/mutants.toml config
          cargo mutants --in-place -vV
        continue-on-error: true

      - name: Upload mutation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-results
          path: mutants.out/
          retention-days: 7

  # =============================================================================
  # Integration Tests (per language)
  # =============================================================================
  integration-test:
    name: Integration (${{ matrix.language }})
    needs: build-framework
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [rust, go, python, java, csharp, cpp]
        exclude:
          - language: ${{ github.event.inputs.language != 'all' && github.event.inputs.language != 'rust' && 'rust' || '' }}
          - language: ${{ github.event.inputs.language != 'all' && github.event.inputs.language != 'go' && 'go' || '' }}
          - language: ${{ github.event.inputs.language != 'all' && github.event.inputs.language != 'python' && 'python' || '' }}
          - language: ${{ github.event.inputs.language != 'all' && github.event.inputs.language != 'java' && 'java' || '' }}
          - language: ${{ github.event.inputs.language != 'all' && github.event.inputs.language != 'csharp' && 'csharp' || '' }}
          - language: ${{ github.event.inputs.language != 'all' && github.event.inputs.language != 'cpp' && 'cpp' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Download framework binary
        uses: actions/download-artifact@v4
        with:
          name: framework-binary
          path: target/release/

      - name: Make binary executable
        run: chmod +x target/release/angzarr-standalone

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.13.0

      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/latest/skaffold-linux-amd64
          chmod +x skaffold
          sudo mv skaffold /usr/local/bin/

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Language-specific setup (needs Docker access, can't use container)
      - name: Set up Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker (Rust)
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv (Python)
        if: matrix.language == 'python'
        uses: astral-sh/setup-uv@v5

      - name: Set up Java
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Install C++ build tools
        if: matrix.language == 'cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgrpc++-dev protobuf-compiler-grpc

      # Create Kind cluster
      - name: Create Kind cluster
        run: |
          kind create cluster --config kind-config.yaml --name angzarr
          kubectl cluster-info

      # Build and load images for the specific language
      - name: Build ${{ matrix.language }} images
        run: just images build ${{ matrix.language }}

      - name: Load images into Kind
        run: just images load ${{ matrix.language }}

      # Deploy infrastructure
      - name: Deploy infrastructure
        run: just infra-ci

      # Deploy language-specific services via skaffold
      - name: Deploy ${{ matrix.language }} services
        run: |
          cd examples/${{ matrix.language }}
          skaffold run --cache-artifacts=false
          kubectl wait --for=condition=ready pod -l app=angzarr -n angzarr --timeout=180s || true

      # Run acceptance tests
      - name: Run acceptance tests
        run: just examples ${{ matrix.language }} test-acceptance
        env:
          ANGZARR_TEST_MODE: container

      # Collect logs on failure
      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n angzarr -o wide || true
          echo ""
          echo "=== Pod Descriptions ==="
          kubectl describe pods -n angzarr || true
          echo ""
          echo "=== Pod Logs ==="
          kubectl logs -n angzarr -l app=angzarr --tail=100 || true

      # Cleanup
      - name: Delete Kind cluster
        if: always()
        run: kind delete cluster --name angzarr || true

  # =============================================================================
  # Results
  # =============================================================================
  test-results:
    name: Test Results
    needs: [integration-test, mutation-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check integration test results
        run: |
          if [ "${{ needs.integration-test.result }}" == "failure" ]; then
            echo "::error::Integration tests failed"
            exit 1
          fi
          echo "All integration tests passed"

      - name: Check mutation test results
        if: needs.mutation-tests.result != 'skipped'
        run: |
          if [ "${{ needs.mutation-tests.result }}" == "failure" ]; then
            echo "::warning::Mutation tests had failures (non-blocking)"
          fi

      - name: Summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mutation Tests | ${{ needs.mutation-tests.result }} |" >> $GITHUB_STEP_SUMMARY
