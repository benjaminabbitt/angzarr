name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_mutation_tests:
        description: 'Run mutation tests'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  KIND_VERSION: v0.20.0
  KUBECTL_VERSION: v1.28.0
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/angzarr
  VERSIONATOR_VERSION: v0.0.11

permissions:
  contents: read
  packages: write

jobs:
  # =============================================================================
  # Version (using versionator)
  # =============================================================================
  version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_tag: ${{ steps.version.outputs.version_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for versionator

      - name: Install versionator
        run: |
          curl -sLO "https://github.com/benjaminabbitt/versionator/releases/download/${{ env.VERSIONATOR_VERSION }}/versionator-linux-amd64"
          chmod +x versionator-linux-amd64
          sudo mv versionator-linux-amd64 /usr/local/bin/versionator

      - name: Get version
        id: version
        run: |
          VERSION=$(versionator version)
          VERSION_TAG=$(versionator version --template '{{.Major}}.{{.Minor}}.{{.Patch}}{{if .PreRelease}}-{{.PreRelease}}{{end}}{{if .CommitsSinceTag}}+{{.CommitsSinceTag}}.{{.ShortCommit}}{{end}}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Version Tag: $VERSION_TAG"

  # =============================================================================
  # Build Framework
  # =============================================================================
  # Uses pre-built rust image from GHCR (built by ci.yml)
  build-framework:
    name: Build Framework
    runs-on: ubuntu-latest
    needs: version
    container: ghcr.io/${{ github.repository_owner }}/angzarr-rust:latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build framework
        run: just build-standalone
        env:
          DEVCONTAINER: "true"

      - name: Upload framework binary
        uses: actions/upload-artifact@v4
        with:
          name: framework-binary
          path: target/release/angzarr-standalone
          retention-days: 1

  # =============================================================================
  # Mutation Testing (Core)
  # =============================================================================
  mutation-tests:
    name: Mutation Tests (Core)
    runs-on: ubuntu-latest
    needs: version
    container: ghcr.io/${{ github.repository_owner }}/angzarr-rust:latest
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mutation_tests == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mutants-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked

      - name: Run full mutation tests
        run: |
          # Full mutation test run using .cargo/mutants.toml config
          cargo mutants --in-place -vV
        continue-on-error: true

      - name: Upload mutation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-results
          path: mutants.out/
          retention-days: 7

  # =============================================================================
  # Core Framework Integration Tests
  # =============================================================================
  # NOTE: Per-language example integration tests have been moved to their repos:
  # - angzarr-examples-{rust,python,go,java,csharp,cpp}
  integration-test:
    name: Integration (Core)
    needs: build-framework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download framework binary
        uses: actions/download-artifact@v4
        with:
          name: framework-binary
          path: target/release/

      - name: Make binary executable
        run: chmod +x target/release/angzarr-standalone

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Run core integration tests
        run: cargo test --test standalone_integration --features "sqlite test-utils"

  # =============================================================================
  # Results
  # =============================================================================
  test-results:
    name: Test Results
    needs: [integration-test, mutation-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check integration test results
        run: |
          if [ "${{ needs.integration-test.result }}" == "failure" ]; then
            echo "::error::Integration tests failed"
            exit 1
          fi
          echo "All integration tests passed"

      - name: Check mutation test results
        if: needs.mutation-tests.result != 'skipped'
        run: |
          if [ "${{ needs.mutation-tests.result }}" == "failure" ]; then
            echo "::warning::Mutation tests had failures (non-blocking)"
          fi

      - name: Summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mutation Tests | ${{ needs.mutation-tests.result }} |" >> $GITHUB_STEP_SUMMARY
