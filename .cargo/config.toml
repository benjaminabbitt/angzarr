# Cargo configuration for faster builds
# mold is a high-performance linker (50-80% faster linking)

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.x86_64-unknown-linux-musl]
# musl builds (containers) - use lld if available, otherwise default
rustflags = ["-C", "target-feature=+crt-static"]

# Faster incremental builds
[build]
incremental = true

# Custom commands
[alias]
xtask = "run --package xtask --"

# =============================================================================
# Development: Override git dependencies with local paths
# This only affects local builds (not copied to containers)
# =============================================================================
[patch."https://github.com/angzarr-io/angzarr-client-rust.git"]
angzarr-client = { path = "/home/babbitt/workspace/angzarr/client-rust/main" }
