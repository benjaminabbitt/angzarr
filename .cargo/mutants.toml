# cargo-mutants configuration
# https://mutants.rs/config-file.html
#
# Run with: cargo mutants -j 8
# Or set: CARGO_MUTANTS_JOBS=8

# Timeout settings
# Multiplier for baseline build/test times (handles slow CI runners)
timeout_multiplier = 1.5
build_timeout_multiplier = 2.0
minimum_test_timeout = 30

# Test configuration
test_tool = "cargo"
additional_cargo_test_args = ["--features", "sqlite", "--features", "test-utils"]

# Cap lints to avoid warnings causing build failures in mutated code
cap_lints = true

# Files to examine (focus on core business logic, skip generated code)
examine_globs = [
  "src/handlers/**/*.rs",
  "src/orchestration/**/*.rs",
  "src/storage/**/*.rs",
  "src/bus/**/*.rs",
  "src/utils/**/*.rs",
  "src/validation/**/*.rs",
]

# Files to exclude
exclude_globs = [
  # Generated code
  "src/proto/**",
  "**/proto.rs",
  "**/*.pb.rs",

  # Test files (testing tests is redundant)
  "**/*.test.rs",
  "**/tests/**",
  "**/test_*.rs",

  # Build/config
  "build.rs",
  "**/mod.rs",
]

# Skip mutations in calls to these functions
# These are side-effect-only functions where return value mutations aren't meaningful
skip_calls = [
  "tracing::*",
  "log::*",
  "debug!",
  "info!",
  "warn!",
  "error!",
  "trace!",
  "println!",
  "eprintln!",
  "dbg!",
  "assert!",
  "assert_eq!",
  "assert_ne!",
  "panic!",
  "unreachable!",
  "todo!",
  "unimplemented!",
]

# Use built-in skip_calls defaults (debug_assert, etc.)
skip_calls_defaults = true
exclude_re = [
  # Auto-generated by: cargo xtask gen-mutants-exclude
  "<impl .*GatewayClient.*for CommandClient>::execute",
  "CommandClient::domains",
  "CommandClient::execute",
  "CommandClient::has_domain",
  "CommandClient::speculative",
]
