# bacon configuration for angzarr
# Run with: bacon

[default]
job = "build"

[jobs.check]
command = ["cargo", "check", "--lib", "--bins", "--color", "always"]
need_stdout = false
on_change_strategy = "kill_then_restart"

[jobs.build]
command = ["cargo", "build", "--lib", "--bins", "--release", "--color", "always"]
need_stdout = false
on_change_strategy = "kill_then_restart"

[jobs.test]
command = ["cargo", "test", "--lib", "--color", "always"]
need_stdout = true
on_change_strategy = "kill_then_restart"

[jobs.clippy]
command = ["cargo", "clippy", "--lib", "--bins", "--color", "always", "--", "-D", "warnings"]
need_stdout = false
on_change_strategy = "kill_then_restart"

[jobs.doc]
command = ["cargo", "doc", "--lib", "--no-deps", "--color", "always"]
need_stdout = false
on_change_strategy = "kill_then_restart"

# Format Rust code
[jobs.fmt]
command = ["cargo", "fmt"]
need_stdout = false
on_change_strategy = "kill_then_restart"

# Proto generation - all languages
[jobs.proto]
command = ["just", "proto", "generate"]
need_stdout = true
on_change_strategy = "kill_then_restart"
watch = ["proto/"]

# Proto generation - Rust only
[jobs.proto-rust]
command = ["just", "proto", "rust"]
need_stdout = true
on_change_strategy = "kill_then_restart"
watch = ["proto/"]

# Keybindings
[keybindings]
c = "job:check"
b = "job:build"
t = "job:test"
l = "job:clippy"
d = "job:doc"
f = "job:fmt"
p = "job:proto"
