# Python poker example - debug configuration
# Enables debug ports for remote debugging with debugpy

# Enable client debug ports
ports:
  clientDebug:
    enabled: true

# Relax security context for debugging
securityContext:
  runAsNonRoot: false
  runAsUser: 0
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: true
  capabilities:
    drop: []
