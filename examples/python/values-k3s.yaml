# Python Poker Example - k3s Local Development Values
# Deploys poker aggregates with angzarr sidecars

# Angzarr sidecar images (from local registry via NodePort)
# k3s containerd runs on host, so use localhost:30500 (NodePort)
images:
  aggregate:
    repository: localhost:30500/angzarr-aggregate
    pullPolicy: Always
    tag: "dev"
  saga:
    repository: localhost:30500/angzarr-saga
    pullPolicy: Always
    tag: "dev"
  projector:
    repository: localhost:30500/angzarr-projector
    pullPolicy: Always
    tag: "dev"
  processManager:
    repository: localhost:30500/angzarr-process-manager
    pullPolicy: Always
    tag: "dev"
  log:
    repository: localhost:30500/angzarr-log
    pullPolicy: Always
    tag: "dev"
  stream:
    repository: localhost:30500/angzarr-stream
    pullPolicy: Always
    tag: "dev"

# Disable security context for local dev (rootless issues)
podSecurityContext: {}
securityContext: {}

# Storage: PostgreSQL (deployed by tofu)
# Credentials from tofu-managed secret (key: uri)
storage:
  type: postgres
  postgres:
    existingSecret: "angzarr-postgres"

# Messaging: RabbitMQ (deployed by tofu)
# Credentials from tofu-managed secret (key: uri)
amqp:
  enabled: true
  existingSecret: "angzarr-amqp"

messaging:
  type: amqp
  amqp:
    enabled: true
    existingSecret: "angzarr-amqp"

# Python Poker Aggregates
applications:
  business:
    # Player domain
    - name: poker-player
      image:
        repository: localhost:30500/poker-python-player
        tag: "dev"
        pullPolicy: Always
      domain: player
      port: 50301

    # Table domain
    - name: poker-table
      image:
        repository: localhost:30500/poker-python-table
        tag: "dev"
        pullPolicy: Always
      domain: table
      port: 50302

    # Hand domain
    - name: poker-hand
      image:
        repository: localhost:30500/poker-python-hand
        tag: "dev"
        pullPolicy: Always
      domain: hand
      port: 50303

  # Sagas for cross-domain event translation
  sagas:
    - name: saga-table-hand
      image:
        repository: localhost:30500/poker-python-saga-table-hand
        tag: "dev"
        pullPolicy: Always
      domain: saga-table-hand
      sourceDomain: table
      port: 50311
      topics:
        - "table.*"

    - name: saga-hand-table
      image:
        repository: localhost:30500/poker-python-saga-hand-table
        tag: "dev"
        pullPolicy: Always
      domain: saga-hand-table
      sourceDomain: hand
      port: 50312
      topics:
        - "hand.*"

    - name: saga-table-player
      image:
        repository: localhost:30500/poker-python-saga-table-player
        tag: "dev"
        pullPolicy: Always
      domain: saga-table-player
      sourceDomain: table
      port: 50313
      topics:
        - "table.*"

    - name: saga-hand-player
      image:
        repository: localhost:30500/poker-python-saga-hand-player
        tag: "dev"
        pullPolicy: Always
      domain: saga-hand-player
      sourceDomain: hand
      port: 50314
      topics:
        - "hand.*"

  # Process Manager for hand lifecycle
  processManagers:
    - name: pmg-hand-flow
      image:
        repository: localhost:30500/poker-python-pmg-hand-flow
        tag: "dev"
        pullPolicy: Always
      domain: hand-flow
      port: 50391
      topics:
        - "table.*"
        - "hand.*"

  # Output projector
  projectors:
    - name: prj-output
      image:
        repository: localhost:30500/poker-python-prj-output
        tag: "dev"
        pullPolicy: Always
      domain: output
      port: 50390
      topics:
        - "player.*"
        - "table.*"
        - "hand.*"

# Resources for local dev (smaller footprint)
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

applicationResources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 25m
    memory: 32Mi

# Logging
logging:
  level: debug
  format: json

# Disable reloader for local dev
reloader:
  enabled: false
