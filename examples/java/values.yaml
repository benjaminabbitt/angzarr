# Java poker example - local development values

replicaCount: 1

# Use local Kind registry
imagePullSecrets: []

storage:
  type: postgres
  postgres:
    host: "angzarr-db-rw"
    port: 5432
    database: "angzarr"
    username: "angzarr"
    password: "angzarr"

messaging:
  type: amqp
  amqp:
    enabled: true
    host: "angzarr-mq"
    port: 5672
    url: "amqp://angzarr:angzarr@angzarr-mq:5672"

# Poker domain aggregates
applications:
  business:
    - name: poker-player
      domain: player
      port: 50601
      image:
        repository: ghcr.io/angzarr-io/poker-java-player
        tag: latest
        pullPolicy: IfNotPresent

    - name: poker-table
      domain: table
      port: 50602
      image:
        repository: ghcr.io/angzarr-io/poker-java-table
        tag: latest
        pullPolicy: IfNotPresent

    - name: poker-hand
      domain: hand
      port: 50603
      image:
        repository: ghcr.io/angzarr-io/poker-java-hand
        tag: latest
        pullPolicy: IfNotPresent

  # Sagas to be added later
  sagas: []

  # Projectors to be added later
  projectors: []

# Resource limits for development
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"

applicationResources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"
