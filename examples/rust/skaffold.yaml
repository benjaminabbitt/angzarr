apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: poker-rust

# Requires base angzarr infrastructure
requires:
  - path: ../../skaffold.yaml

build:
  tagPolicy:
    gitCommit:
      prefix: "dev-"
      variant: AbbrevCommitSha
  local:
    push: false
    useBuildkit: true
    concurrency: 1
  artifacts:
    # Dev targets (fast builds)
    - image: ghcr.io/angzarr-io/poker-rust-player
      context: ../..
      docker:
        dockerfile: examples/rust/Containerfile
        target: agg-player-dev
      requires:
        - image: ghcr.io/angzarr-io/angzarr-rust
          alias: RUST_IMAGE

    - image: ghcr.io/angzarr-io/poker-rust-table
      context: ../..
      docker:
        dockerfile: examples/rust/Containerfile
        target: agg-table-dev
      requires:
        - image: ghcr.io/angzarr-io/angzarr-rust
          alias: RUST_IMAGE

    - image: ghcr.io/angzarr-io/poker-rust-hand
      context: ../..
      docker:
        dockerfile: examples/rust/Containerfile
        target: agg-hand-dev
      requires:
        - image: ghcr.io/angzarr-io/angzarr-rust
          alias: RUST_IMAGE

deploy:
  helm:
    releases:
      - name: poker-rust
        chartPath: ../../deploy/k8s/helm/angzarr
        namespace: angzarr
        createNamespace: true
        valuesFiles:
          - values.yaml
        setValues:
          # Player aggregate
          applications.business[0].name: poker-player
          applications.business[0].image.repository: ghcr.io/angzarr-io/poker-rust-player
          applications.business[0].image.tag: latest
          applications.business[0].domain: player
          applications.business[0].port: 50001
          # Table aggregate
          applications.business[1].name: poker-table
          applications.business[1].image.repository: ghcr.io/angzarr-io/poker-rust-table
          applications.business[1].image.tag: latest
          applications.business[1].domain: table
          applications.business[1].port: 50002
          # Hand aggregate
          applications.business[2].name: poker-hand
          applications.business[2].image.repository: ghcr.io/angzarr-io/poker-rust-hand
          applications.business[2].image.tag: latest
          applications.business[2].domain: hand
          applications.business[2].port: 50003

profiles:
  # Kind profile - no push, images loaded directly to Kind
  - name: kind
    build:
      local:
        push: false

  # Release profile - slower builds, minimal images
  - name: release
    build:
      artifacts:
        - image: ghcr.io/angzarr-io/poker-rust-player
          context: ../..
          docker:
            dockerfile: examples/rust/Containerfile
            target: agg-player
          requires:
            - image: ghcr.io/angzarr-io/angzarr-rust
              alias: RUST_IMAGE

        - image: ghcr.io/angzarr-io/poker-rust-table
          context: ../..
          docker:
            dockerfile: examples/rust/Containerfile
            target: agg-table
          requires:
            - image: ghcr.io/angzarr-io/angzarr-rust
              alias: RUST_IMAGE

        - image: ghcr.io/angzarr-io/poker-rust-hand
          context: ../..
          docker:
            dockerfile: examples/rust/Containerfile
            target: agg-hand
          requires:
            - image: ghcr.io/angzarr-io/angzarr-rust
              alias: RUST_IMAGE

  # Debug profile - gdbserver enabled for remote debugging
  - name: debug
    build:
      local:
        push: false
      artifacts:
        - image: ghcr.io/angzarr-io/poker-rust-player
          context: ../..
          docker:
            dockerfile: examples/rust/Containerfile
            target: agg-player-debug
          requires:
            - image: ghcr.io/angzarr-io/angzarr-rust
              alias: RUST_IMAGE

        - image: ghcr.io/angzarr-io/poker-rust-table
          context: ../..
          docker:
            dockerfile: examples/rust/Containerfile
            target: agg-table-debug
          requires:
            - image: ghcr.io/angzarr-io/angzarr-rust
              alias: RUST_IMAGE

        - image: ghcr.io/angzarr-io/poker-rust-hand
          context: ../..
          docker:
            dockerfile: examples/rust/Containerfile
            target: agg-hand-debug
          requires:
            - image: ghcr.io/angzarr-io/angzarr-rust
              alias: RUST_IMAGE
    deploy:
      helm:
        releases:
          - name: poker-rust
            chartPath: ../../deploy/k8s/helm/angzarr
            namespace: angzarr
            createNamespace: true
            valuesFiles:
              - values.yaml
              - values-debug.yaml
            setValues:
              # Player aggregate with debug port
              applications.business[0].name: poker-player
              applications.business[0].image.repository: ghcr.io/angzarr-io/poker-rust-player
              applications.business[0].image.tag: latest
              applications.business[0].domain: player
              applications.business[0].port: 50001
              applications.business[0].debugPort: 20000
              # Table aggregate with debug port
              applications.business[1].name: poker-table
              applications.business[1].image.repository: ghcr.io/angzarr-io/poker-rust-table
              applications.business[1].image.tag: latest
              applications.business[1].domain: table
              applications.business[1].port: 50002
              applications.business[1].debugPort: 20001
              # Hand aggregate with debug port
              applications.business[2].name: poker-hand
              applications.business[2].image.repository: ghcr.io/angzarr-io/poker-rust-hand
              applications.business[2].image.tag: latest
              applications.business[2].domain: hand
              applications.business[2].port: 50003
              applications.business[2].debugPort: 20002
