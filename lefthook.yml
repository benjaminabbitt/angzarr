# Lefthook configuration for angzarr
# https://github.com/evilmartians/lefthook
#
# Post-commit hooks trigger skaffold deployment after commits.
# This ensures deployed code matches committed code.
#
# All images use sha256 content-based tags:
#   - New content = new tag = K8s pulls fresh image
#   - Same content = same tag = skaffold cache hit (no rebuild)
#
# Setup: lefthook install
# Bypass: git commit --no-verify (or LEFTHOOK=0 git commit)

post-commit:
  parallel: false
  commands:
    # Deploy all images after commits that touch relevant files
    # Skaffold caches unchanged images - only rebuilds what changed
    deploy:
      run: |
        echo "=== Post-commit: Building and deploying ==="
        cd examples/rust && skaffold run 2>&1 | tail -30
        echo "=== Deployment complete ==="
      # Only run if code/config files changed
      only:
        - "src/**"
        - "proto/**"
        - "Cargo.toml"
        - "Cargo.lock"
        - "Containerfile"
        - "examples/rust/**"
        - "deploy/k8s/**"
        - "deploy/k3s/**"

pre-commit:
  parallel: false
  commands:
    # Rust - runs in container via just
    rust-fmt:
      glob: "*.rs"
      run: just fmt
      stage_fixed: true
    rust-clippy:
      glob: "*.rs"
      run: just lint
    rust-test:
      glob: "*.rs"
      run: just test

    # Python - runs in container via just
    python-fmt:
      glob: "*.py"
      run: just fmt-python
      stage_fixed: true

    # Go - runs in container via just
    go-fmt:
      glob: "*.go"
      run: just fmt-go
      stage_fixed: true

    # C# - runs in container via just
    csharp-fmt:
      glob: "*.cs"
      run: just fmt-csharp
      stage_fixed: true

    # Java - runs in container via just
    java-fmt:
      glob: "*.java"
      run: just fmt-java
      stage_fixed: true

    # C++ - runs in container via just
    cpp-fmt:
      glob: "*.{cpp,hpp,cc,h,cxx}"
      run: just fmt-cpp
      stage_fixed: true

    # OpenTofu
    tofu-fmt:
      glob: "deploy/tofu/**/*.tf"
      run: tofu fmt -recursive deploy/tofu/
      stage_fixed: true
