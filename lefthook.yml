# Lefthook configuration for angzarr
# https://github.com/evilmartians/lefthook
#
# Pre-commit hooks ensure code quality (format, lint, test).
#
# Setup: lefthook install
# Bypass: git commit --no-verify (or LEFTHOOK=0 git commit)

# NOTE: Post-commit deploy removed - examples extracted to angzarr-examples-* repos
# To auto-deploy, add post-commit hooks in those repos instead.

pre-commit:
  parallel: false
  commands:
    # Rust - runs in container via just
    rust-fmt:
      glob: "**/*.rs"
      run: just fmt
      stage_fixed: true
    rust-clippy:
      glob: "**/*.rs"
      run: just lint
    rust-test:
      glob: "**/*.rs"
      run: just test

    # Python - runs in container via just (scripts only, client/examples extracted)
    python-fmt:
      glob: "scripts/**/*.py"
      run: just fmt-python
      stage_fixed: true

    # NOTE: Go, C#, Java, C++ hooks removed - code extracted to separate repos
    # See: angzarr-client-{go,csharp,java,cpp} and angzarr-examples-{go,csharp,java,cpp}

    # OpenTofu
    tofu-fmt:
      glob: "deploy/tofu/**/*.tf"
      run: tofu fmt -recursive deploy/tofu/
      stage_fixed: true
