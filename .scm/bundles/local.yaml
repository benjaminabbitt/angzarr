version: "1.0"
fragments:
    rust-test-support-pattern:
        tags:
            - rust
            - testing
            - patterns
        content: "# Rust Test Support File Pattern\n\nKeep test-only code out of production source files while maintaining cohesion and privacy.\n\n## Problem\n\nProduction code sometimes needs to call test-specific logic (e.g., mock handlers, test fixtures). Inline `#[cfg(test)]` blocks pollute production files with test code.\n\n## Solution\n\nUse `#[path]` directive to conditionally include test support from a separate file:\n\n```\nsrc/module/\n├── foo.rs                 # Production code (clean)\n├── foo_test_support.rs    # Test helpers (separate file)\n├── tests.rs               # Unit tests\n└── mod.rs\n```\n\n### Production file (foo.rs)\n\n```rust\n// Only 4 lines of test boilerplate in production file\n#[cfg(test)]\n#[path = \"foo_test_support.rs\"]\npub(crate) mod test_support;\n\nfn production_function() {\n    // ...\n    \n    #[cfg(test)]\n    if needs_test_handling {\n        return test_support::test_handler();\n    }\n    \n    // ... production logic\n}\n```\n\n### Test support file (foo_test_support.rs)\n\n```rust\n//! Test support for foo module.\n//!\n//! This file is only compiled during tests via #[path] include.\n\nuse std::collections::HashSet;\n\n/// Test-only helper function.\n/// \n/// Use pub(crate) so sibling test modules (tests.rs) can access.\n/// Use pub(super) if only the parent module needs access.\npub(crate) fn test_handler() -> HashSet<String> {\n    // Test implementation\n    HashSet::new()\n}\n\npub(crate) fn parse_test_data(input: &str) -> ParsedData {\n    // Test parsing logic\n}\n```\n\n### Unit tests (tests.rs)\n\n```rust\nuse super::foo::test_support::{test_handler, parse_test_data};\n\n#[test]\nfn test_handler_returns_empty_set() {\n    let result = test_handler();\n    assert!(result.is_empty());\n}\n```\n\n## Visibility Guide\n\n| Visibility | Use When |\n|------------|----------|\n| `pub(super)` | Only parent module (foo.rs) needs access |\n| `pub(crate)` | Sibling modules (tests.rs) also need access |\n\n## Benefits\n\n| Aspect | Outcome |\n|--------|---------|\n| Production file | Clean—only 4 lines of `#[cfg(test)]` boilerplate |\n| Separation | Test code in dedicated `*_test_support.rs` file |\n| Privacy | `pub(crate)` keeps functions crate-private (test builds only) |\n| Cohesion | Support file sits adjacent to production file |\n| Discoverability | Naming convention makes relationship clear |\n\n## When to Use\n\n- Production code needs conditional test behavior\n- Test helpers are substantial (>20 lines)\n- You want to minimize context window load when reading production code\n\n## When NOT to Use\n\n- Simple `#[cfg(test)]` constants or small helpers (<10 lines)\n- Test code that doesn't need to be called from production code\n- Use regular `foo.test.rs` pattern for pure unit tests instead\n\n## Real-World Example: Commutative Merge\n\nThe `src/orchestration/aggregate/` module uses this pattern for test state diffing:\n\n**Problem:** `diff_state_fields()` in merge.rs needs to handle `test.StatefulState` type during tests using JSON-like parsing. This required ~100 lines of test-only code.\n\n**Before:** merge.rs contained inline `#[cfg(test)]` functions and a test module—readers had to mentally skip test code when understanding the production logic.\n\n**After:**\n```\nsrc/orchestration/aggregate/\n├── merge.rs                 # 205 lines - production only\n├── merge_test_support.rs    # 55 lines - test helpers\n├── tests.rs                 # Unit tests import from test_support\n└── mod.rs\n```\n\n**merge.rs** (clean production file):\n```rust\n#[cfg(test)]\n#[path = \"merge_test_support.rs\"]\npub(crate) mod test_support;\n\npub(crate) fn diff_state_fields(before: &Any, after: &Any) -> HashSet<String> {\n    // ...\n    \n    #[cfg(test)]\n    if before.type_url == \"test.StatefulState\" {\n        return test_support::diff_test_state_fields(&before.value, &after.value);\n    }\n    \n    // ... production logic (proto_reflect, byte fallback)\n}\n```\n\n**merge_test_support.rs** (test helpers):\n```rust\n//! Test support for merge module.\n//! Only compiled during tests via #[path] include in merge.rs.\n\npub(crate) fn parse_test_state_fields(s: &str) -> HashMap<String, String> { ... }\npub(crate) fn diff_test_state_fields(before: &[u8], after: &[u8]) -> HashSet<String> { ... }\n```\n\n**tests.rs** (unit tests):\n```rust\nuse super::merge::test_support::{diff_test_state_fields, parse_test_state_fields};\n\n#[test]\nfn test_diff_test_state_fields_single_change() {\n    let before = r#\"{\"field_a\":100,\"field_b\":200}\"#.as_bytes();\n    let after = r#\"{\"field_a\":100,\"field_b\":300}\"#.as_bytes();\n    let changed = diff_test_state_fields(before, after);\n    assert!(changed.contains(\"field_b\"));\n}\n```\n\n**Result:** Production file reduced from ~300 lines to ~205 lines. Test code cleanly separated but still co-located for discoverability.\n"
