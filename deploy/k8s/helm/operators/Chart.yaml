apiVersion: v2
name: angzarr-operators
description: Kubernetes operators for Angzarr infrastructure (CloudNativePG, RabbitMQ, Strimzi)
type: application
version: 0.1.0
appVersion: "1.0.0"

# Install to 'operators' namespace, manages CRs in any namespace
# Usage: helm install angzarr-operators ./deploy/helm/angzarr-operators -n operators --create-namespace

dependencies:
  # CloudNativePG - PostgreSQL operator (CNCF sandbox)
  # https://cloudnative-pg.io/
  - name: cloudnative-pg
    version: "0.27.1"
    repository: "https://cloudnative-pg.github.io/charts"
    condition: cloudnativepg.enabled

  # Strimzi - Kafka operator (CNCF graduated)
  # https://strimzi.io/
  # Note: 0.49+ introduces v1 API for all CRs (v1alpha1/v1beta1/v1beta2 still supported until 1.0)
  - name: strimzi-kafka-operator
    version: "0.50.1"
    repository: "https://strimzi.io/charts/"
    condition: strimzi.enabled

# RabbitMQ Cluster Operator - installed separately via kubectl (no official Helm chart)
# See: kubectl apply -f https://github.com/rabbitmq/cluster-operator/releases/latest/download/cluster-operator.yml
# Or use: just operators-rabbitmq
