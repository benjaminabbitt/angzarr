# Angzarr Operators - installs Kubernetes operators for infrastructure
#
# Install once per cluster:
#   helm install angzarr-operators ./deploy/helm/angzarr-operators -n operators --create-namespace
#
# Operators watch all namespaces by default. Workloads (CRs) deploy to angzarr namespace.

# CloudNativePG - PostgreSQL operator
cloudnativepg:
  enabled: true

# CloudNativePG subchart configuration
cloudnative-pg:
  # Operator configuration
  replicaCount: 1

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

  # Monitoring
  monitoring:
    enabled: false
    podMonitor:
      enabled: false

# Strimzi - Kafka operator
strimzi:
  enabled: true

# Strimzi subchart configuration
strimzi-kafka-operator:
  # Watch all namespaces
  watchAnyNamespace: true

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # Default Kafka version for new clusters
  # NOTE: Tag must match chart version (0.50.x) or Kafka version validation fails
  defaultImageRegistry: quay.io
  defaultImageTag: "0.50.0"

# RabbitMQ Cluster Operator - installed separately (no official Helm chart)
# Install with: just operators-rabbitmq
# Or manually: kubectl apply -f https://github.com/rabbitmq/cluster-operator/releases/download/v2.12.0/cluster-operator.yml
rabbitmq:
  # Version to install (used by justfile)
  version: "2.12.0"
