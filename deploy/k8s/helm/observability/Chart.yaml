apiVersion: v2
name: observability
description: Observability stack for Angzarr - Grafana, Prometheus, Tempo, Loki, OTel Collector
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: tempo
    version: "1.24.4"
    repository: "https://grafana.github.io/helm-charts"
    condition: tempo.enabled

  - name: prometheus
    version: "28.9.1"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled

  - name: loki
    version: "6.53.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled

  # Note: Promtail is deprecated (merged into Grafana Alloy), support ends Feb 2026
  # Consider migrating to Alloy for log collection
  - name: promtail
    version: "6.16.6"
    repository: "https://grafana.github.io/helm-charts"
    condition: promtail.enabled

  - name: opentelemetry-collector
    version: "0.145.0"
    repository: "https://open-telemetry.github.io/opentelemetry-helm-charts"
    condition: opentelemetry-collector.enabled

  - name: grafana
    version: "10.5.15"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
