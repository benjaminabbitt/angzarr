# RabbitMQ configuration for Angzarr (RabbitMQ Cluster Operator)
#
# Requires RabbitMQ Cluster Operator:
#   kubectl apply -f https://github.com/rabbitmq/cluster-operator/releases/latest/download/cluster-operator.yml
#
# Install this chart:
#   helm install angzarr-mq ./deploy/helm/angzarr-mq-rabbitmq -n angzarr --create-namespace \
#     --set auth.password=<password>

# Cluster name (used for service DNS: <name>)
name: angzarr-mq

# RabbitMQ image
image:
  repository: rabbitmq
  tag: "4.1-management"

# Number of replicas
# Dev: 1, Production: 3 (HA with quorum queues)
replicas: 1

# Storage configuration
storage:
  size: 1Gi
  storageClass: ""

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Authentication
# Password should be set via --set auth.password=<password> or existing secret
auth:
  # Default username
  username: "angzarr"
  # Password (required if not using existingSecret)
  password: ""
  # Use existing secret instead of creating one
  # Secret must have keys: username, password
  existingSecret: ""

# RabbitMQ plugins
plugins:
  - rabbitmq_management
  - rabbitmq_peer_discovery_k8s
  - rabbitmq_prometheus

# Additional RabbitMQ configuration
rabbitmq:
  additionalConfig: |
    # Angzarr defaults
    vm_memory_high_watermark.relative = 0.8
    disk_free_limit.relative = 1.5

# Management UI
management:
  # Expose management UI via NodePort (dev only)
  nodePort:
    enabled: false
    port: 30672

# Monitoring (requires Prometheus Operator)
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false

# TLS configuration (optional)
tls:
  enabled: false
  # secretName: rabbitmq-tls
