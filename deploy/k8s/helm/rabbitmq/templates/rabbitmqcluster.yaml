# RabbitmqCluster - RabbitMQ for Angzarr
# https://www.rabbitmq.com/kubernetes/operator/using-operator
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: {{ include "angzarr-mq-rabbitmq.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr-mq-rabbitmq.labels" . | nindent 4 }}
spec:
  # Number of RabbitMQ nodes
  replicas: {{ .Values.replicas }}

  # RabbitMQ image
  image: {{ .Values.image.repository }}:{{ .Values.image.tag }}

  # Credentials
  secretBackend:
    vault:
      annotations: {}
  override:
    statefulSet:
      spec:
        template:
          spec:
            containers:
              - name: rabbitmq
                resources:
                  {{- toYaml .Values.resources | nindent 18 }}

  # Storage configuration
  persistence:
    {{- if .Values.storage.storageClass }}
    storageClassName: {{ .Values.storage.storageClass }}
    {{- end }}
    storage: {{ .Values.storage.size }}

  # RabbitMQ configuration
  rabbitmq:
    # Enabled plugins
    additionalPlugins:
      {{- toYaml .Values.plugins | nindent 6 }}

    # Additional configuration
    additionalConfig: |
      default_user = {{ .Values.auth.username }}
      default_pass = {{ .Values.auth.password }}
      {{- .Values.rabbitmq.additionalConfig | nindent 6 }}

  # Service configuration
  service:
    type: ClusterIP

  {{- if .Values.tls.enabled }}
  # TLS configuration
  tls:
    secretName: {{ .Values.tls.secretName }}
  {{- end }}
---
{{- if .Values.management.nodePort.enabled }}
# NodePort service for management UI (dev only)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "angzarr-mq-rabbitmq.fullname" . }}-management
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr-mq-rabbitmq.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: {{ include "angzarr-mq-rabbitmq.fullname" . }}
  ports:
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: {{ .Values.management.nodePort.port }}
{{- end }}
