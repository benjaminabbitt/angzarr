# Redis configuration for Angzarr (official image)
#
# Install this chart:
#   helm install angzarr-redis ./deploy/helm/angzarr-db-redis -n angzarr --create-namespace \
#     --set auth.password=<password>

# Instance name
name: angzarr-redis

# Redis image (official from Docker Hub)
image:
  repository: redis
  tag: "7.4-alpine"
  pullPolicy: IfNotPresent

# Architecture: standalone or replication
# standalone = single node (dev)
# replication = master + replicas (production)
architecture: standalone

# Number of replicas (only for replication architecture)
replicas: 0

# Storage configuration
storage:
  enabled: true
  size: 8Gi
  storageClass: ""

# Resource limits
resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Authentication
auth:
  enabled: true
  # Password (required if auth.enabled and not using existingSecret)
  password: ""
  # Use existing secret (must have key: redis-password)
  existingSecret: ""

# Redis configuration
redis:
  # Maximum memory (should be less than resources.limits.memory)
  maxmemory: "200mb"
  maxmemoryPolicy: "allkeys-lru"
  # Append-only file for persistence
  appendonly: "yes"
  appendfsync: "everysec"

# Security context
securityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999

# Service configuration
service:
  type: ClusterIP
  port: 6379

# Monitoring
monitoring:
  enabled: false
