apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "angzarr-db-redis.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr-db-redis.labels" . | nindent 4 }}
data:
  redis.conf: |
    # Redis configuration for Angzarr
    bind 0.0.0.0
    port 6379

    # Memory management
    maxmemory {{ .Values.redis.maxmemory }}
    maxmemory-policy {{ .Values.redis.maxmemoryPolicy }}

    # Persistence
    appendonly {{ .Values.redis.appendonly }}
    appendfsync {{ .Values.redis.appendfsync }}
    dir /data

    # Security
    {{- if .Values.auth.enabled }}
    # Password is set via command line argument for security
    {{- end }}

    # Logging
    loglevel notice
