{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "angzarr-db-redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr-db-redis.labels" . | nindent 4 }}
type: Opaque
stringData:
  redis-password: {{ required "auth.password is required when auth.enabled=true (or use auth.existingSecret)" .Values.auth.password | quote }}
{{- end }}
