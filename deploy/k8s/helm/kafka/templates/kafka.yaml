# Strimzi Kafka Cluster - KRaft mode (no ZooKeeper)
# https://strimzi.io/docs/operators/latest/deploying#deploying-cluster-operator-str
{{- if .Values.kraft.enabled }}
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: {{ include "angzarr-mq-kafka.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: {{ include "angzarr-mq-kafka.fullname" . }}
    {{- include "angzarr-mq-kafka.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controller.replicas }}
  roles:
    - controller
  storage:
    type: {{ .Values.controller.storage.type }}
    size: {{ .Values.controller.storage.size }}
    {{- if .Values.controller.storage.storageClass }}
    class: {{ .Values.controller.storage.storageClass }}
    {{- end }}
    deleteClaim: {{ .Values.controller.storage.deleteClaim }}
  resources:
    {{- toYaml .Values.controller.resources | nindent 4 }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: {{ include "angzarr-mq-kafka.fullname" . }}-broker
  namespace: {{ .Release.Namespace }}
  labels:
    strimzi.io/cluster: {{ include "angzarr-mq-kafka.fullname" . }}
    {{- include "angzarr-mq-kafka.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kafka.replicas }}
  roles:
    - broker
  storage:
    type: {{ .Values.kafka.storage.type }}
    size: {{ .Values.kafka.storage.size }}
    {{- if .Values.kafka.storage.storageClass }}
    class: {{ .Values.kafka.storage.storageClass }}
    {{- end }}
    deleteClaim: {{ .Values.kafka.storage.deleteClaim }}
  resources:
    {{- toYaml .Values.kafka.resources | nindent 4 }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ include "angzarr-mq-kafka.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr-mq-kafka.labels" . | nindent 4 }}
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: {{ .Values.version }}
    metadataVersion: {{ .Values.version }}
    listeners:
      {{- range .Values.kafka.listeners }}
      - name: {{ .name }}
        port: {{ .port }}
        type: {{ .type }}
        tls: {{ .tls }}
      {{- end }}
    config:
      {{- range $key, $value := .Values.kafka.config }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
  {{- if .Values.entityOperator.enabled }}
  entityOperator:
    {{- if .Values.entityOperator.topicOperator.enabled }}
    topicOperator: {}
    {{- end }}
    {{- if .Values.entityOperator.userOperator.enabled }}
    userOperator: {}
    {{- end }}
  {{- end }}
  {{- if and .Values.monitoring.enabled .Values.monitoring.kafkaExporter.enabled }}
  kafkaExporter: {}
  {{- end }}
{{- else }}
# ZooKeeper mode (legacy) - not recommended for new deployments
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: {{ include "angzarr-mq-kafka.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr-mq-kafka.labels" . | nindent 4 }}
spec:
  kafka:
    version: {{ .Values.version }}
    replicas: {{ .Values.kafka.replicas }}
    listeners:
      {{- range .Values.kafka.listeners }}
      - name: {{ .name }}
        port: {{ .port }}
        type: {{ .type }}
        tls: {{ .tls }}
      {{- end }}
    config:
      {{- range $key, $value := .Values.kafka.config }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
    storage:
      type: {{ .Values.kafka.storage.type }}
      size: {{ .Values.kafka.storage.size }}
      {{- if .Values.kafka.storage.storageClass }}
      class: {{ .Values.kafka.storage.storageClass }}
      {{- end }}
      deleteClaim: {{ .Values.kafka.storage.deleteClaim }}
    resources:
      {{- toYaml .Values.kafka.resources | nindent 6 }}
  zookeeper:
    replicas: {{ .Values.controller.replicas }}
    storage:
      type: {{ .Values.controller.storage.type }}
      size: {{ .Values.controller.storage.size }}
      {{- if .Values.controller.storage.storageClass }}
      class: {{ .Values.controller.storage.storageClass }}
      {{- end }}
      deleteClaim: {{ .Values.controller.storage.deleteClaim }}
    resources:
      {{- toYaml .Values.controller.resources | nindent 6 }}
  {{- if .Values.entityOperator.enabled }}
  entityOperator:
    {{- if .Values.entityOperator.topicOperator.enabled }}
    topicOperator: {}
    {{- end }}
    {{- if .Values.entityOperator.userOperator.enabled }}
    userOperator: {}
    {{- end }}
  {{- end }}
{{- end }}
