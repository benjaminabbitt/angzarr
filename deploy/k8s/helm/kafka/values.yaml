# Kafka configuration for Angzarr (Strimzi Operator, KRaft mode)
#
# Requires Strimzi operator:
#   helm install angzarr-operators ./deploy/helm/angzarr-operators -n operators --create-namespace
#
# Install this chart:
#   helm install angzarr-kafka ./deploy/helm/angzarr-mq-kafka -n angzarr --create-namespace

# Cluster name
name: angzarr-kafka

# Kafka version
version: "3.9.0"

# KRaft mode (no ZooKeeper) - default and recommended
# Set to false only for legacy compatibility
kraft:
  enabled: true

# Kafka configuration
kafka:
  # Number of broker replicas
  # Dev: 1, Production: 3
  replicas: 1

  # Storage configuration
  storage:
    type: persistent-claim
    size: 2Gi
    storageClass: ""
    deleteClaim: false

  # Resource limits
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi

  # Kafka configuration overrides
  config:
    # Auto-create topics (convenient for dev)
    auto.create.topics.enable: "true"
    # Default replication factor (should match replica count for HA)
    default.replication.factor: 1
    # Minimum in-sync replicas
    min.insync.replicas: 1
    # Offsets topic replication
    offsets.topic.replication.factor: 1
    # Transaction state log replication
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
    # Log retention
    log.retention.hours: 168

  # Listeners
  listeners:
    # Internal listener (within K8s)
    - name: plain
      port: 9092
      type: internal
      tls: false
    # Optional: external listener (NodePort for dev)
    # - name: external
    #   port: 9094
    #   type: nodeport
    #   tls: false

# KRaft controller configuration (only used when kraft.enabled=true)
controller:
  # Number of controller replicas
  # Dev: 1, Production: 3
  replicas: 1

  # Storage configuration
  storage:
    type: persistent-claim
    size: 1Gi
    storageClass: ""
    deleteClaim: false

  # Resource limits
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 256Mi

# Entity Operator (manages topics and users)
entityOperator:
  enabled: true
  topicOperator:
    enabled: true
  userOperator:
    enabled: true

# Monitoring (requires Prometheus Operator)
monitoring:
  enabled: false
  # Kafka Exporter
  kafkaExporter:
    enabled: false
