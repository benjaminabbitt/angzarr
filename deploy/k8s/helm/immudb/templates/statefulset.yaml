apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "angzarr-db-immudb.fullname" . }}
  labels:
    {{- include "angzarr-db-immudb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "angzarr-db-immudb.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "angzarr-db-immudb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "angzarr-db-immudb.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "angzarr-db-immudb.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: immudb
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: 3322
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.immudb.metricsPort }}
              protocol: TCP
            - name: web
              containerPort: {{ .Values.immudb.webServerPort }}
              protocol: TCP
          env:
            - name: IMMUDB_ADDRESS
              value: "0.0.0.0"
            - name: IMMUDB_PORT
              value: "3322"
            - name: IMMUDB_METRICS_SERVER
              value: "true"
            - name: IMMUDB_METRICS_SERVER_PORT
              value: "{{ .Values.immudb.metricsPort }}"
            - name: IMMUDB_WEB_SERVER
              value: "true"
            - name: IMMUDB_WEB_SERVER_PORT
              value: "{{ .Values.immudb.webServerPort }}"
            {{- if .Values.immudb.adminPassword }}
            - name: IMMUDB_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "angzarr-db-immudb.fullname" . }}
                  key: admin-password
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/immudb
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
