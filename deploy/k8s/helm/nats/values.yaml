# NATS configuration for Angzarr (official nats-io chart)
#
# Install this chart:
#   helm install angzarr-nats ./deploy/helm/angzarr-bus-nats -n angzarr --create-namespace

# Official NATS chart configuration
# https://github.com/nats-io/k8s/blob/main/helm/charts/nats/values.yaml
nats:
  # NATS server configuration
  config:
    cluster:
      enabled: false
      replicas: 1

    # JetStream (persistence layer)
    jetstream:
      enabled: true
      fileStore:
        pvc:
          enabled: true
          size: 10Gi
          storageClassName: ""
      memoryStore:
        enabled: true
        maxSize: 256Mi

  # Container configuration
  container:
    image:
      repository: nats
      tag: "2.10-alpine"
      pullPolicy: IfNotPresent

    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # Service configuration
  service:
    enabled: true
    ports:
      nats:
        enabled: true
        port: 4222
      monitor:
        enabled: true
        port: 8222

  # NATS Box (CLI tool for debugging)
  natsBox:
    enabled: true
    container:
      image:
        repository: natsio/nats-box
        tag: "0.14.3"

  # Pod configuration
  podTemplate:
    topologySpreadConstraints: {}

  # StatefulSet name override
  # fullnameOverride: angzarr-nats

# Common labels
commonLabels: {}
