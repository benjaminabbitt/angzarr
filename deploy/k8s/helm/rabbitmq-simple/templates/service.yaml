# RabbitMQ service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rabbitmq-simple.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rabbitmq-simple.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "rabbitmq-simple.selectorLabels" . | nindent 4 }}
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
      protocol: TCP
    - name: management
      port: 15672
      targetPort: management
      protocol: TCP
---
{{- if .Values.management.nodePort.enabled }}
# NodePort service for management UI (dev only)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rabbitmq-simple.fullname" . }}-management
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rabbitmq-simple.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    {{- include "rabbitmq-simple.selectorLabels" . | nindent 4 }}
  ports:
    - name: management
      port: 15672
      targetPort: management
      nodePort: {{ .Values.management.nodePort.port }}
{{- end }}
