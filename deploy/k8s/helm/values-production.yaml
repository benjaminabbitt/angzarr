# Production values example for Angzarr infrastructure
#
# Usage:
#   helm upgrade --install angzarr-db ./deploy/helm/angzarr-db-postgres \
#     -n angzarr -f deploy/helm/values-production.yaml \
#     --set auth.password=<secure-password>
#
# This file shows recommended production settings. Copy and customize.

# PostgreSQL (CloudNativePG) - HA configuration
# Chart: angzarr-db-postgres
postgresql:
  # 3 instances for HA with automatic failover
  instances: 3

  storage:
    size: 50Gi
    storageClass: "fast-ssd"  # Use your cluster's fast storage class

  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

  # Enable connection pooler for better connection management
  pooler:
    enabled: true
    instances: 2
    poolMode: transaction

  # Enable monitoring
  monitoring:
    enabled: true
    podMonitor:
      enabled: true

  # Configure backups (example for S3)
  # backup:
  #   enabled: true
  #   destinationType: s3
  #   s3:
  #     bucket: my-backup-bucket
  #     path: /angzarr/postgres
  #     region: us-east-1
  #   schedule: "0 2 * * *"
  #   retentionPolicy: "30d"

---
# RabbitMQ (Cluster Operator) - HA configuration
# Chart: angzarr-mq-rabbitmq
rabbitmq:
  # 3 replicas for quorum queues
  replicas: 3

  storage:
    size: 10Gi
    storageClass: "fast-ssd"

  resources:
    limits:
      cpu: 1
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

  # Enable TLS
  # tls:
  #   enabled: true
  #   secretName: rabbitmq-tls

---
# Kafka (Strimzi) - HA configuration
# Chart: angzarr-mq-kafka
kafka:
  kafka:
    replicas: 3
    storage:
      size: 50Gi
      storageClass: "fast-ssd"
    resources:
      limits:
        cpu: 2
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 1Gi
    config:
      default.replication.factor: 3
      min.insync.replicas: 2

  controller:
    replicas: 3
    storage:
      size: 10Gi
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi

  monitoring:
    enabled: true
    kafkaExporter:
      enabled: true

---
# Redis - HA configuration (if using Redis)
# Chart: angzarr-db-redis
redis:
  architecture: replication
  replicas: 2

  storage:
    size: 20Gi
    storageClass: "fast-ssd"

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 256Mi
