# Simple PostgreSQL configuration for CI
# No operator required - direct StatefulSet deployment

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

# Authentication and database setup
auth:
  username: angzarr
  password: angzarr
  database: angzarr

# Resources (minimal for CI)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Storage (ephemeral for CI - no persistence)
persistence:
  enabled: false

# Service configuration
service:
  type: ClusterIP
