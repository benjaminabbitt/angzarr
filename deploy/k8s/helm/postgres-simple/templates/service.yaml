# PostgreSQL service
# Named angzarr-db-rw to match CloudNativePG naming convention
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgres-simple.serviceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres-simple.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "postgres-simple.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
