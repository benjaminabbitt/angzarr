# CloudNativePG Cluster - PostgreSQL for Angzarr
# https://cloudnative-pg.io/documentation/current/cloudnative-pg.v1/
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "angzarr-db-postgres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr-db-postgres.labels" . | nindent 4 }}
spec:
  # Number of PostgreSQL instances
  # 1 = single node (dev), 3+ = HA with automatic failover (production)
  instances: {{ .Values.instances }}

  # PostgreSQL image
  imageName: {{ .Values.image.repository }}:{{ .Values.image.tag }}

  # Bootstrap configuration - initialize the database
  bootstrap:
    initdb:
      database: {{ .Values.database.name }}
      owner: {{ .Values.database.owner }}
      secret:
        name: {{ include "angzarr-db-postgres.secretName" . }}

  # Storage configuration
  storage:
    size: {{ .Values.storage.size }}
    {{- if .Values.storage.storageClass }}
    storageClass: {{ .Values.storage.storageClass }}
    {{- end }}

  # Resource limits
  resources:
    {{- toYaml .Values.resources | nindent 4 }}

  # PostgreSQL configuration parameters
  postgresql:
    parameters:
      {{- range $key, $value := .Values.postgresql.parameters }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}

  # Security context
  {{- if .Values.securityContext }}
  securityContext:
    {{- toYaml .Values.securityContext | nindent 4 }}
  {{- end }}

  # Monitoring
  {{- if .Values.monitoring.enabled }}
  monitoring:
    enablePodMonitor: {{ .Values.monitoring.podMonitor.enabled }}
  {{- end }}

  # Primary update strategy
  primaryUpdateStrategy: unsupervised

  # Replication slots for HA
  {{- if gt (int .Values.instances) 1 }}
  replicationSlots:
    highAvailability:
      enabled: true
  {{- end }}

  {{- if .Values.pooler.enabled }}
  # Connection pooler (PgBouncer)
  # Creates separate service: {{ include "angzarr-db-postgres.fullname" . }}-pooler
  ---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ include "angzarr-db-postgres.fullname" . }}-pooler
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr-db-postgres.labels" . | nindent 4 }}
spec:
  cluster:
    name: {{ include "angzarr-db-postgres.fullname" . }}
  instances: {{ .Values.pooler.instances }}
  type: rw
  pgbouncer:
    poolMode: {{ .Values.pooler.poolMode }}
  {{- end }}
