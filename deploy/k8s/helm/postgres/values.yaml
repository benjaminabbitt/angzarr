# PostgreSQL configuration for Angzarr (CloudNativePG)
#
# Requires CloudNativePG operator:
#   helm install angzarr-operators ./deploy/helm/angzarr-operators -n operators --create-namespace
#
# Install this chart:
#   helm install angzarr-db ./deploy/helm/angzarr-db-postgres -n angzarr --create-namespace \
#     --set auth.password=<password>

# Cluster name (used for service DNS: <name>-rw, <name>-ro, <name>-r)
name: angzarr-db

# PostgreSQL image
image:
  repository: ghcr.io/cloudnative-pg/postgresql
  tag: "16.4"

# Number of instances
# Dev: 1 (no HA), Production: 3 (HA with automatic failover)
instances: 1

# Storage configuration
storage:
  size: 8Gi
  storageClass: ""

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Database configuration
database:
  name: angzarr
  owner: angzarr

# Authentication
# Password should be set via --set auth.password=<password> or existing secret
auth:
  # Database user password (required if not using existingSecret)
  password: ""
  # Use existing secret instead of creating one
  # Secret must have keys: username, password
  existingSecret: ""

# Backup configuration (optional)
backup:
  enabled: false
  # Backup destination (s3, gcs, azure, or local)
  # destinationType: s3
  # s3:
  #   bucket: my-bucket
  #   path: /backups
  #   region: us-east-1
  #   accessKey: ""
  #   secretKey: ""
  # Schedule (cron format)
  # schedule: "0 0 * * *"
  # Retention policy
  # retentionPolicy: "30d"

# Monitoring (requires Prometheus Operator)
monitoring:
  enabled: false
  podMonitor:
    enabled: false

# Pod configuration
podSecurityContext:
  fsGroup: 26

securityContext:
  runAsNonRoot: true
  runAsUser: 26
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Connection pooler (PgBouncer)
pooler:
  enabled: false
  instances: 1
  poolMode: transaction

# PostgreSQL parameters
postgresql:
  parameters:
    # Reasonable defaults for event sourcing workloads
    shared_buffers: "128MB"
    max_connections: "100"
    # Log slow queries
    log_min_duration_statement: "1000"
