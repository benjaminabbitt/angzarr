{{- /* Services for aggregate (client logic) applications */}}
{{- /* Naming convention: {domain}-aggregate → player-aggregate.angzarr.svc.cluster.local */}}
{{- range .Values.applications.business }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "angzarr.aggregate-service-name" (dict "domain" .domain) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "angzarr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: aggregate
    angzarr.io/domain: {{ .domain }}
  annotations:
    # DNS: {domain}-aggregate.{namespace}.svc.cluster.local
    angzarr.io/dns-name: "{{ include "angzarr.aggregate-service-name" (dict "domain" .domain) }}.{{ $.Release.Namespace }}.svc.cluster.local"
spec:
  type: ClusterIP
  ports:
    # Angzarr sidecar aggregate coordinator (external access)
    - port: {{ $.Values.service.aggregatePort }}
      targetPort: aggregate
      protocol: TCP
      name: grpc
    # Angzarr sidecar event query (external access)
    - port: {{ $.Values.service.queryPort }}
      targetPort: query
      protocol: TCP
      name: query
    {{- if $.Values.ports.coordinatorDebug.enabled }}
    # Coordinator debug port (base + 2)
    - port: {{ add $.Values.service.aggregatePort 2 }}
      targetPort: coord-debug
      protocol: TCP
      name: coord-debug
    {{- end }}
    {{- if $.Values.ports.clientLogic.enabled }}
    # client logic gRPC (base + 3, usually internal only)
    - port: {{ .port }}
      targetPort: grpc
      protocol: TCP
      name: client-logic
    {{- end }}
    {{- if $.Values.ports.clientDebug.enabled }}
    # Client debug port (base + 4)
    - port: {{ add .port 1 }}
      targetPort: client-debug
      protocol: TCP
      name: client-debug
    {{- end }}
  selector:
    {{- include "angzarr.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: aggregate
    angzarr.io/domain: {{ .domain }}
{{- end }}

{{- /* Services for projector applications */}}
{{- /* Naming convention: {name}-projector → order-projector.angzarr.svc.cluster.local */}}
{{- range .Values.applications.projectors }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "angzarr.projector-service-name" (dict "name" .name) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "angzarr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: projector
    {{- if .domain }}
    angzarr.io/domain: {{ .domain }}
    {{- end }}
  annotations:
    angzarr.io/dns-name: "{{ include "angzarr.projector-service-name" (dict "name" .name) }}.{{ $.Release.Namespace }}.svc.cluster.local"
spec:
  type: ClusterIP
  ports:
    # Projector coordinator gRPC service
    - port: {{ .port | default 50051 }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    {{- if $.Values.ports.coordinatorDebug.enabled }}
    # Coordinator debug port (base + 2)
    - port: {{ add ((.port | default 50051) | int) 2 }}
      targetPort: coord-debug
      protocol: TCP
      name: coord-debug
    {{- end }}
    {{- if $.Values.ports.clientDebug.enabled }}
    # Client debug port (base + 4)
    - port: {{ add ((.port | default 50051) | int) 1 }}
      targetPort: client-debug
      protocol: TCP
      name: client-debug
    {{- end }}
  selector:
    {{- include "angzarr.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: projector
    angzarr.io/app: {{ .name }}
{{- end }}

{{- /* Services for saga applications */}}
{{- /* Naming convention: {name}-saga → order-fulfillment-saga.angzarr.svc.cluster.local */}}
{{- range .Values.applications.sagas }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "angzarr.saga-service-name" (dict "name" .name) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "angzarr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: saga
    {{- if .sourceDomain }}
    angzarr.io/source-domain: {{ .sourceDomain }}
    {{- end }}
    {{- if .domain }}
    angzarr.io/domain: {{ .domain }}
    {{- end }}
  annotations:
    angzarr.io/dns-name: "{{ include "angzarr.saga-service-name" (dict "name" .name) }}.{{ $.Release.Namespace }}.svc.cluster.local"
spec:
  type: ClusterIP
  ports:
    # Saga coordinator gRPC service
    - port: {{ .port | default 50051 }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    {{- if $.Values.ports.coordinatorDebug.enabled }}
    # Coordinator debug port (base + 2)
    - port: {{ add ((.port | default 50051) | int) 2 }}
      targetPort: coord-debug
      protocol: TCP
      name: coord-debug
    {{- end }}
    {{- if $.Values.ports.clientDebug.enabled }}
    # Client debug port (base + 4)
    - port: {{ add ((.port | default 50051) | int) 1 }}
      targetPort: client-debug
      protocol: TCP
      name: client-debug
    {{- end }}
  selector:
    {{- include "angzarr.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: saga
    angzarr.io/saga: {{ .name }}
{{- end }}

{{- /* Services for process manager applications */}}
{{- /* Naming convention: {name}-pm → hand-flow-pm.angzarr.svc.cluster.local */}}
{{- range .Values.applications.processManagers }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "angzarr.pm-service-name" (dict "name" .name) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "angzarr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: process-manager
    angzarr.io/pm: {{ .name }}
    {{- if .domain }}
    angzarr.io/domain: {{ .domain }}
    {{- end }}
  annotations:
    angzarr.io/dns-name: "{{ include "angzarr.pm-service-name" (dict "name" .name) }}.{{ $.Release.Namespace }}.svc.cluster.local"
spec:
  type: ClusterIP
  ports:
    # Process manager coordinator gRPC service
    - port: {{ $.Values.service.aggregatePort }}
      targetPort: aggregate
      protocol: TCP
      name: grpc
    # Event query port
    - port: {{ $.Values.service.queryPort }}
      targetPort: query
      protocol: TCP
      name: query
  selector:
    {{- include "angzarr.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: process-manager
    angzarr.io/pm: {{ .name }}
{{- end }}

{{- /* Headless service for service discovery (optional) */}}
{{- if .Values.serviceDiscovery.headless }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "angzarr.fullname" . }}-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.aggregatePort }}
      targetPort: aggregate
      protocol: TCP
      name: command
  selector:
    {{- include "angzarr.selectorLabels" . | nindent 4 }}
{{- end }}

{{- /* Event Stream service */}}
{{- if .Values.infrastructure.stream.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "angzarr.fullname" . }}-stream
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
    angzarr.io/service: stream
  annotations:
    angzarr.io/dns-name: "{{ include "angzarr.fullname" . }}-stream.{{ .Release.Namespace }}.svc.cluster.local"
spec:
  type: {{ .Values.infrastructure.stream.serviceType | default "ClusterIP" }}
  ports:
    - port: {{ .Values.infrastructure.stream.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
      {{- if and (eq (.Values.infrastructure.stream.serviceType | default "ClusterIP") "NodePort") .Values.infrastructure.stream.nodePort }}
      nodePort: {{ .Values.infrastructure.stream.nodePort }}
      {{- end }}
  selector:
    {{- include "angzarr.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
    angzarr.io/service: stream
{{- end }}

{{- /* NodePort service for local development aggregate access */}}
{{- if .Values.service.nodePort.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "angzarr.fullname" . }}-aggregate-nodeport
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: aggregate-access
spec:
  type: NodePort
  ports:
    # Aggregate sidecar exposes AggregateCoordinator and EventQuery
    - port: {{ .Values.service.aggregatePort }}
      targetPort: aggregate
      protocol: TCP
      name: grpc
      nodePort: {{ .Values.service.nodePort.aggregate }}
  selector:
    {{- include "angzarr.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: aggregate
{{- end }}

{{- /* Debug NodePort services for individual aggregate applications */}}
{{- range $index, $app := .Values.applications.business }}
{{- if and $app.debug $app.debug.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "angzarr.aggregate-service-name" (dict "domain" $app.domain) }}-debug
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "angzarr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: aggregate-debug
    angzarr.io/domain: {{ $app.domain }}
spec:
  type: NodePort
  ports:
    - port: {{ $.Values.service.aggregatePort }}
      targetPort: aggregate
      protocol: TCP
      name: grpc
      {{- if $app.debug.nodePort }}
      nodePort: {{ $app.debug.nodePort }}
      {{- end }}
  selector:
    {{- include "angzarr.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: aggregate
    angzarr.io/domain: {{ $app.domain }}
{{- end }}
{{- end }}

