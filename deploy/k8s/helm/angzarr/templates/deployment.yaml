{{- /* Generate deployments for each application type with angzarr as sidecar */}}

{{- /* client logic deployments */}}
{{- /* Naming convention: {domain}-aggregate → player-aggregate */}}
{{- range .Values.applications.business }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "angzarr.aggregate-service-name" (dict "domain" .domain) }}
  labels:
    {{- include "angzarr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: aggregate
    angzarr.io/domain: {{ .domain }}
  {{- if $.Values.reloader.enabled }}
  annotations:
    reloader.stakater.com/auto: "true"
  {{- end }}
spec:
  {{- if not $.Values.autoscaling.enabled }}
  replicas: {{ $.Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "angzarr.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: aggregate
      angzarr.io/domain: {{ .domain }}
  template:
    metadata:
      annotations:
        {{- if $.Values.reloader.enabled }}
        reloader.stakater.com/auto: "true"
        {{- end }}
        {{- with $.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "angzarr.labels" $ | nindent 8 }}
        app.kubernetes.io/component: aggregate
        angzarr.io/domain: {{ .domain }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "angzarr.serviceAccountName" $ }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if eq $.Values.storage.type "postgres" }}
        # Wait for PostgreSQL
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z angzarr-db-postgresql 5432 2>/dev/null; do sleep 2; done
              echo "PostgreSQL is ready"
        {{- end }}
        {{- if $.Values.amqp.enabled }}
        # Wait for RabbitMQ (deployed by Terraform)
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for RabbitMQ..."
              until nc -z angzarr-mq-rabbitmq 5672 2>/dev/null; do sleep 2; done
              echo "RabbitMQ is ready"
        {{- end }}
      containers:
        # Main container: client logic application
        # Port scheme: base+3 = client logic, base+4 = client debug
        - name: {{ .name }}
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: grpc
              containerPort: {{ .port }}
              protocol: TCP
            {{- if $.Values.ports.clientDebug.enabled }}
            - name: client-debug
              containerPort: {{ add .port 1 }}
              protocol: TCP
            {{- end }}
          env:
            # client logic application port (sidecar calls this)
            - name: PORT
              value: "{{ .port }}"
            - name: DOMAIN
              value: {{ .domain | quote }}
            # Angzarr sidecar endpoint (consolidated on single port)
            - name: ANGZARR_HOST
              value: "localhost"
            - name: ANGZARR_PORT
              value: "{{ $.Values.service.aggregatePort }}"
            {{- if eq .type "python" }}
            - name: client_logic_TYPE
              value: "python"
            - name: PYTHON_MODULE
              value: {{ .python.module | quote }}
            - name: PYTHON_PATH
              value: {{ .python.path | quote }}
            {{- end }}
            {{- if eq .type "go" }}
            - name: client_logic_TYPE
              value: "go"
            - name: GO_LIBRARY
              value: {{ .go.library | quote }}
            {{- end }}
            - name: ANGZARR_LOG
              value: {{ $.Values.logging.level }}
            {{- if .env }}
            {{- toYaml .env | nindent 12 }}
            {{- end }}
          resources:
            {{- if .resources }}
            {{- toYaml .resources | nindent 12 }}
            {{- else }}
            {{- toYaml $.Values.applicationResources | nindent 12 }}
            {{- end }}
          securityContext:
            {{- include "angzarr.containerSecurityContext" $ | nindent 12 }}

        # Sidecar: Angzarr aggregate sidecar
        # Port scheme: base+0 = coordinator, base+2 = coordinator debug
        - name: angzarr
          securityContext:
            {{- include "angzarr.containerSecurityContext" $ | nindent 12 }}
          image: "{{ $.Values.images.aggregate.repository }}:{{ $.Values.images.aggregate.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.images.aggregate.pullPolicy }}
          ports:
            - name: aggregate
              containerPort: {{ $.Values.service.aggregatePort }}
              protocol: TCP
            - name: query
              containerPort: {{ $.Values.service.queryPort }}
              protocol: TCP
            {{- if $.Values.ports.coordinatorDebug.enabled }}
            - name: coord-debug
              containerPort: {{ add $.Values.service.aggregatePort 2 }}
              protocol: TCP
            {{- end }}
          env:
            - name: ANGZARR_LOG
              value: {{ $.Values.logging.level }}
            # Namespace and pod name for K8s service discovery and annotation writing
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Transport — bind to all interfaces, single gRPC server hosts both coordinator + query
            - name: ANGZARR__TRANSPORT__TCP__HOST
              value: "0.0.0.0"
            - name: ANGZARR__TRANSPORT__TCP__PORT
              value: "{{ $.Values.service.aggregatePort }}"
            # Target configuration
            - name: ANGZARR__TARGET__ADDRESS
              value: "localhost:{{ .port }}"
            - name: ANGZARR__TARGET__DOMAIN
              value: {{ .domain | quote }}
            # Storage configuration - from secret if provided, else inline
            - name: ANGZARR__STORAGE__TYPE
              value: {{ $.Values.storage.type | quote }}
            {{- if eq $.Values.storage.type "postgres" }}
            {{- if $.Values.storage.postgres.existingSecret }}
            - name: ANGZARR__STORAGE__POSTGRES__URI
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.storage.postgres.existingSecret }}
                  key: uri
            {{- else }}
            - name: ANGZARR__STORAGE__POSTGRES__URI
              value: {{ $.Values.storage.postgres.uri | quote }}
            {{- end }}
            {{- end }}
            # AMQP configuration for event publishing
            {{- if $.Values.amqp.enabled }}
            - name: ANGZARR__MESSAGING__TYPE
              value: "amqp"
            - name: ANGZARR__MESSAGING__AMQP__URL
              {{- if $.Values.amqp.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.amqp.existingSecret }}
                  key: uri
              {{- else }}
              value: {{ $.Values.amqp.url }}
              {{- end }}
            {{- end }}
            # Command bus configuration (async command delivery)
            # Aggregates can receive commands via bus in addition to gRPC
            {{- if and $.Values.amqp.enabled $.Values.commandBus.enabled }}
            - name: ANGZARR__COMMAND_BUS__ENABLED
              value: "true"
            - name: ANGZARR__COMMAND_BUS__TOPIC
              value: "commands.{{ .domain }}"
            {{- end }}
            # Upcaster configuration (client implements UpcasterService on same server)
            {{- if $.Values.upcaster.enabled }}
            - name: ANGZARR_UPCASTER_ENABLED
              value: "true"
            {{- if $.Values.upcaster.address }}
            - name: ANGZARR_UPCASTER_ADDRESS
              value: {{ $.Values.upcaster.address | quote }}
            {{- end }}
            {{- end }}
            {{- include "angzarr.otel-env" (dict "root" $ "service" "aggregate" "domain" .domain) | nindent 12 }}
          livenessProbe:
            {{- toYaml $.Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml $.Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- /* Projector deployments */}}
{{- /* Naming convention: {name}-projector → order-projector */}}
{{- range .Values.applications.projectors }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "angzarr.projector-service-name" (dict "name" .name) }}
  labels:
    {{- include "angzarr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: projector
  {{- if $.Values.reloader.enabled }}
  annotations:
    reloader.stakater.com/auto: "true"
  {{- end }}
spec:
  {{- if not $.Values.autoscaling.enabled }}
  replicas: {{ $.Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "angzarr.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: projector
      angzarr.io/app: {{ .name }}
  template:
    metadata:
      annotations:
        {{- if $.Values.reloader.enabled }}
        reloader.stakater.com/auto: "true"
        {{- end }}
        {{- with $.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "angzarr.labels" $ | nindent 8 }}
        app.kubernetes.io/component: projector
        angzarr.io/app: {{ .name }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "angzarr.serviceAccountName" $ }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if $.Values.amqp.enabled }}
        # Wait for RabbitMQ (deployed by Terraform)
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for RabbitMQ..."
              until nc -z angzarr-mq-rabbitmq 5672 2>/dev/null; do sleep 2; done
              echo "RabbitMQ is ready"
        {{- end }}
      containers:
        # Main container: Projector application
        # Port scheme: base+3 = client logic, base+4 = client debug
        - name: {{ .name }}
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: grpc
              containerPort: {{ .port | default 50051 }}
              protocol: TCP
            {{- if $.Values.ports.clientDebug.enabled }}
            - name: client-debug
              containerPort: {{ add (.port | default 50051) 1 }}
              protocol: TCP
            {{- end }}
          env:
            # gRPC port this projector listens on
            # Projector application port
            - name: PORT
              value: "{{ .port | default 50051 }}"
            # Angzarr sidecar endpoint (consolidated on single port)
            - name: ANGZARR_HOST
              value: "localhost"
            - name: ANGZARR_PORT
              value: "{{ $.Values.service.queryPort }}"
            # AMQP for event subscription
            {{- if $.Values.amqp.enabled }}
            - name: MESSAGING_TYPE
              value: "amqp"
            - name: MESSAGING_AMQP_URL
              {{- if $.Values.amqp.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.amqp.existingSecret }}
                  key: uri
              {{- else }}
              value: {{ $.Values.amqp.url | quote }}
              {{- end }}
            {{- end }}
            - name: EVENT_TOPICS
              value: {{ .topics | join "," | quote }}
            - name: ANGZARR_LOG
              value: {{ $.Values.logging.level }}
            # PostgreSQL for read model storage
            - name: DATABASE_URL
              {{- if $.Values.storage.postgres.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.storage.postgres.existingSecret }}
                  key: uri
              {{- else }}
              value: {{ $.Values.storage.postgres.uri | quote }}
              {{- end }}
          resources:
            {{- if .resources }}
            {{- toYaml .resources | nindent 12 }}
            {{- else }}
            {{- toYaml $.Values.applicationResources | nindent 12 }}
            {{- end }}
          securityContext:
            {{- include "angzarr.containerSecurityContext" $ | nindent 12 }}

        # Sidecar: Angzarr projector sidecar
        # Port scheme: base+0 = coordinator, base+2 = coordinator debug
        - name: angzarr
          securityContext:
            {{- include "angzarr.containerSecurityContext" $ | nindent 12 }}
          image: "{{ $.Values.images.projector.repository }}:{{ $.Values.images.projector.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.images.projector.pullPolicy }}
          ports:
            - name: query
              containerPort: {{ $.Values.service.queryPort }}
              protocol: TCP
            {{- if $.Values.ports.coordinatorDebug.enabled }}
            - name: coord-debug
              containerPort: {{ add $.Values.service.queryPort 2 }}
              protocol: TCP
            {{- end }}
          env:
            - name: ANGZARR_LOG
              value: {{ $.Values.logging.level }}
            # Namespace and pod name for K8s service discovery and annotation writing
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Server config — bind to all interfaces
            - name: ANGZARR__SERVER__HOST
              value: "0.0.0.0"
            - name: ANGZARR__SERVER__EVENT_QUERY_PORT
              value: "{{ $.Values.service.queryPort }}"
            # Projector sidecar target address
            - name: ANGZARR__TARGET__ADDRESS
              value: "localhost:{{ .port | default 50051 }}"
            - name: ANGZARR__TARGET__DOMAIN
              value: {{ .domain | quote }}
            # Storage configuration - from secret if provided
            - name: ANGZARR__STORAGE__TYPE
              value: {{ $.Values.storage.type | quote }}
            {{- if eq $.Values.storage.type "postgres" }}
            {{- if $.Values.storage.postgres.existingSecret }}
            - name: ANGZARR__STORAGE__POSTGRES__URI
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.storage.postgres.existingSecret }}
                  key: uri
            {{- else }}
            - name: ANGZARR__STORAGE__POSTGRES__URI
              value: {{ $.Values.storage.postgres.uri | quote }}
            {{- end }}
            {{- end }}
            # Messaging configuration
            {{- if $.Values.amqp.enabled }}
            - name: ANGZARR__MESSAGING__TYPE
              value: "amqp"
            - name: ANGZARR__MESSAGING__AMQP__URL
              {{- if $.Values.amqp.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.amqp.existingSecret }}
                  key: uri
              {{- else }}
              value: {{ $.Values.amqp.url }}
              {{- end }}
            - name: ANGZARR__MESSAGING__AMQP__DOMAIN
              value: {{ .topics | first | default "#" | quote }}
            {{- end }}
            {{- include "angzarr.otel-env" (dict "root" $ "service" "projector" "domain" .domain) | nindent 12 }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- /* Saga deployments */}}
{{- /* Naming convention: {name}-saga → order-fulfillment-saga */}}
{{- range .Values.applications.sagas }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "angzarr.saga-service-name" (dict "name" .name) }}
  labels:
    {{- include "angzarr.labels" $ | nindent 4 }}
    app.kubernetes.io/component: saga
  {{- if $.Values.reloader.enabled }}
  annotations:
    reloader.stakater.com/auto: "true"
  {{- end }}
spec:
  {{- if not $.Values.autoscaling.enabled }}
  replicas: {{ $.Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "angzarr.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: saga
      angzarr.io/saga: {{ .name }}
  template:
    metadata:
      annotations:
        {{- if $.Values.reloader.enabled }}
        reloader.stakater.com/auto: "true"
        {{- end }}
        {{- with $.Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "angzarr.labels" $ | nindent 8 }}
        app.kubernetes.io/component: saga
        angzarr.io/saga: {{ .name }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "angzarr.serviceAccountName" $ }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if $.Values.amqp.enabled }}
        # Wait for RabbitMQ (deployed by Terraform)
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for RabbitMQ..."
              until nc -z angzarr-mq-rabbitmq 5672 2>/dev/null; do sleep 2; done
              echo "RabbitMQ is ready"
        {{- end }}
      containers:
        # Main container: Saga application
        # Port scheme: base+3 = client logic, base+4 = client debug
        - name: {{ .name }}
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: grpc
              containerPort: {{ .port | default 50051 }}
              protocol: TCP
            {{- if $.Values.ports.clientDebug.enabled }}
            - name: client-debug
              containerPort: {{ add (.port | default 50051) 1 }}
              protocol: TCP
            {{- end }}
          env:
            # Saga application port
            - name: PORT
              value: "{{ .port | default 50051 }}"
            # Angzarr sidecar endpoint (consolidated on single port)
            - name: ANGZARR_HOST
              value: "localhost"
            - name: ANGZARR_PORT
              value: "{{ $.Values.service.aggregatePort }}"
            # AMQP for event subscription
            {{- if $.Values.amqp.enabled }}
            - name: MESSAGING_TYPE
              value: "amqp"
            - name: MESSAGING_AMQP_URL
              {{- if $.Values.amqp.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.amqp.existingSecret }}
                  key: uri
              {{- else }}
              value: {{ $.Values.amqp.url | quote }}
              {{- end }}
            {{- end }}
            - name: EVENT_TOPICS
              value: {{ .topics | join "," | quote }}
            - name: ANGZARR_LOG
              value: {{ $.Values.logging.level }}
          resources:
            {{- if .resources }}
            {{- toYaml .resources | nindent 12 }}
            {{- else }}
            {{- toYaml $.Values.applicationResources | nindent 12 }}
            {{- end }}
          securityContext:
            {{- include "angzarr.containerSecurityContext" $ | nindent 12 }}

        # Sidecar: Angzarr saga sidecar
        # Port scheme: base+0 = coordinator, base+2 = coordinator debug
        - name: angzarr
          securityContext:
            {{- include "angzarr.containerSecurityContext" $ | nindent 12 }}
          image: "{{ $.Values.images.saga.repository }}:{{ $.Values.images.saga.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.images.saga.pullPolicy }}
          ports:
            - name: aggregate
              containerPort: {{ $.Values.service.aggregatePort }}
              protocol: TCP
            - name: query
              containerPort: {{ $.Values.service.queryPort }}
              protocol: TCP
            {{- if $.Values.ports.coordinatorDebug.enabled }}
            - name: coord-debug
              containerPort: {{ add $.Values.service.aggregatePort 2 }}
              protocol: TCP
            {{- end }}
          env:
            - name: ANGZARR_LOG
              value: {{ $.Values.logging.level }}
            # Namespace and pod name for K8s service discovery and annotation writing
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Server config — bind to all interfaces
            - name: ANGZARR__SERVER__HOST
              value: "0.0.0.0"
            - name: ANGZARR__SERVER__AGGREGATE_PORT
              value: "{{ $.Values.service.aggregatePort }}"
            - name: ANGZARR__SERVER__EVENT_QUERY_PORT
              value: "{{ $.Values.service.queryPort }}"
            # Saga sidecar target
            - name: ANGZARR__TARGET__ADDRESS
              value: "localhost:{{ .port | default 50051 }}"
            - name: ANGZARR__TARGET__DOMAIN
              value: {{ .domain | quote }}
            # Static endpoints for two-phase saga command routing
            # Uses new naming convention: {domain}-aggregate
            - name: ANGZARR_STATIC_ENDPOINTS
              value: "{{ include "angzarr.static-endpoints" (dict "root" $ "port" $.Values.service.aggregatePort) }}"
            # Storage configuration - from secret if provided
            - name: ANGZARR__STORAGE__TYPE
              value: {{ $.Values.storage.type | quote }}
            {{- if eq $.Values.storage.type "postgres" }}
            {{- if $.Values.storage.postgres.existingSecret }}
            - name: ANGZARR__STORAGE__POSTGRES__URI
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.storage.postgres.existingSecret }}
                  key: uri
            {{- else }}
            - name: ANGZARR__STORAGE__POSTGRES__URI
              value: {{ $.Values.storage.postgres.uri | quote }}
            {{- end }}
            {{- end }}
            # Messaging configuration
            {{- if $.Values.amqp.enabled }}
            - name: ANGZARR__MESSAGING__TYPE
              value: "amqp"
            - name: ANGZARR__MESSAGING__AMQP__URL
              {{- if $.Values.amqp.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.amqp.existingSecret }}
                  key: uri
              {{- else }}
              value: {{ $.Values.amqp.url }}
              {{- end }}
            - name: ANGZARR__MESSAGING__AMQP__DOMAIN
              value: {{ .topics | first | default "#" | quote }}
            {{- end }}
            {{- include "angzarr.otel-env" (dict "root" $ "service" "saga" "domain" (.domain | trimPrefix "saga-")) | nindent 12 }}
          # NOTE: No liveness/readiness probes - saga sidecar is a pure consumer (no server ports)
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

