        - name: {{ .name }}
          image: "{{ .image.repository }}:{{ .image.tag }}"
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: grpc
              containerPort: {{ .port | default 50051 }}
              protocol: TCP
          env:
            - name: PORT
              value: "{{ .port | default 50051 }}"
            - name: ANGZARR_HOST
              value: "localhost"
            - name: ANGZARR_PORT
              value: "{{ $.Values.service.aggregatePort }}"
            - name: ANGZARR_LOG
              value: {{ $.Values.logging.level }}
          resources:
            {{- if .resources }}
            {{- toYaml .resources | nindent 12 }}
            {{- else }}
            {{- toYaml $.Values.applicationResources | nindent 12 }}
            {{- end }}
          securityContext:
            {{- include "angzarr.containerSecurityContext" $ | nindent 12 }}

        # Sidecar: Angzarr process-manager sidecar
        - name: angzarr
          securityContext:
            {{- include "angzarr.containerSecurityContext" $ | nindent 12 }}
          image: "{{ $.Values.images.processManager.repository }}:{{ $.Values.images.processManager.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.images.processManager.pullPolicy }}
          ports:
            - name: aggregate
              containerPort: {{ $.Values.service.aggregatePort }}
              protocol: TCP
            - name: query
              containerPort: {{ $.Values.service.queryPort }}
              protocol: TCP
          env:
            - name: ANGZARR_LOG
              value: {{ $.Values.logging.level }}
            # Namespace and pod name for K8s service discovery and annotation writing
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Server config — bind to all interfaces
            - name: ANGZARR__SERVER__HOST
              value: "0.0.0.0"
            - name: ANGZARR__SERVER__AGGREGATE_PORT
              value: "{{ $.Values.service.aggregatePort }}"
            - name: ANGZARR__SERVER__EVENT_QUERY_PORT
              value: "{{ $.Values.service.queryPort }}"
            - name: ANGZARR__TARGET__ADDRESS
              value: "localhost:{{ .port | default 50051 }}"
            - name: ANGZARR__TARGET__DOMAIN
              value: {{ .domain | quote }}
            # Static endpoints for multi-domain command routing (business aggregates only)
            # PM state persistence is handled directly by the sidecar (no self-reference needed)
            # Uses new naming convention: {domain}-aggregate
            - name: ANGZARR_STATIC_ENDPOINTS
              value: "{{ include "angzarr.static-endpoints" (dict "root" $ "port" $.Values.service.aggregatePort) }}"
            # Storage configuration
            - name: ANGZARR__STORAGE__TYPE
              value: {{ $.Values.storage.type | quote }}
            {{- if eq $.Values.storage.type "postgres" }}
            {{- if $.Values.storage.postgres.existingSecret }}
            - name: ANGZARR__STORAGE__POSTGRES__URI
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.storage.postgres.existingSecret }}
                  key: uri
            {{- else }}
            - name: ANGZARR__STORAGE__POSTGRES__URI
              value: {{ $.Values.storage.postgres.uri | quote }}
            {{- end }}
            {{- end }}
            # Messaging configuration
            {{- if $.Values.amqp.enabled }}
            - name: ANGZARR__MESSAGING__TYPE
              value: "amqp"
            - name: ANGZARR__MESSAGING__AMQP__URL
              {{- if $.Values.amqp.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.amqp.existingSecret }}
                  key: uri
              {{- else }}
              value: {{ $.Values.amqp.url }}
              {{- end }}
            - name: ANGZARR__MESSAGING__AMQP__DOMAIN
              value: {{ .topics | join "," | quote }}
            {{- end }}
            # Multi-domain subscriptions for process manager routing
            # Convert topics (table.*, hand.*) to subscriptions format (table;hand)
            - name: ANGZARR_SUBSCRIPTIONS
              value: "{{ range $i, $topic := .topics }}{{ if $i }};{{ end }}{{ $topic | trimSuffix ".*" }}{{ end }}"
            {{- include "angzarr.otel-env" (dict "root" $ "service" "process-manager" "domain" .domain) | nindent 12 }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- /* Central infrastructure services */}}

{{- /* Event Stream service - infrastructure projector with sidecar */}}
{{- if .Values.infrastructure.stream.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "angzarr.fullname" . }}-stream
  labels:
    {{- include "angzarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
    angzarr.io/service: stream
  {{- if .Values.reloader.enabled }}
  annotations:
    reloader.stakater.com/auto: "true"
  {{- end }}
spec:
  replicas: {{ .Values.infrastructure.stream.replicas }}
  selector:
    matchLabels:
      {{- include "angzarr.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: infrastructure
      angzarr.io/service: stream
  template:
    metadata:
      labels:
        {{- include "angzarr.labels" . | nindent 8 }}
        app.kubernetes.io/component: infrastructure
        angzarr.io/service: stream
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "angzarr.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if .Values.messaging.amqp.enabled }}
        # Wait for RabbitMQ (deployed by Terraform)
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for RabbitMQ..."
              until nc -z angzarr-mq-rabbitmq 5672 2>/dev/null; do sleep 2; done
              echo "RabbitMQ is ready"
        {{- end }}
      containers:
        # Stream projector - receives events from sidecar, exposes EventStream for subscribers
        - name: stream
          securityContext:
            {{- include "angzarr.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.images.stream.repository }}:{{ .Values.images.stream.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.images.stream.pullPolicy }}
          ports:
            # Single gRPC server hosts both ProjectorCoordinator + EventStream
            - name: grpc
              containerPort: {{ .Values.infrastructure.stream.port }}
              protocol: TCP
          env:
            - name: ANGZARR_LOG
              value: {{ .Values.logging.level }}
            # Transport — bind to all interfaces, single gRPC server hosts both projector + event stream
            - name: ANGZARR__TRANSPORT__TCP__HOST
              value: "0.0.0.0"
            - name: ANGZARR__TRANSPORT__TCP__PORT
              value: "{{ .Values.infrastructure.stream.port }}"
            {{- include "angzarr.otel-env" (dict "root" . "service" "stream") | nindent 12 }}
          resources:
            {{- toYaml .Values.infrastructure.stream.resources | nindent 12 }}

        # Projector sidecar - subscribes to all AMQP events and forwards to stream
        - name: angzarr
          securityContext:
            {{- include "angzarr.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.images.projector.repository }}:{{ .Values.images.projector.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.images.projector.pullPolicy }}
          env:
            - name: ANGZARR_LOG
              value: {{ .Values.logging.level }}
            # Target: stream container (single server hosts both services)
            - name: ANGZARR__TARGET__ADDRESS
              value: "localhost:{{ .Values.infrastructure.stream.port }}"
            - name: ANGZARR__TARGET__DOMAIN
              value: "stream"
            # Subscribe to ALL events (stream forwards by correlation ID)
            {{- if .Values.messaging.amqp.enabled }}
            - name: ANGZARR__MESSAGING__TYPE
              value: "amqp"
            - name: ANGZARR__MESSAGING__AMQP__URL
              {{- if .Values.messaging.amqp.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.messaging.amqp.existingSecret }}
                  key: {{ .Values.messaging.amqp.secretKey }}
              {{- else }}
              value: {{ .Values.messaging.amqp.url }}
              {{- end }}
            # Subscribe to all domains
            - name: ANGZARR__MESSAGING__AMQP__DOMAIN
              value: "#"
            {{- end }}
            {{- include "angzarr.otel-env" (dict "root" . "service" "projector" "domain" "stream") | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

{{- /* Log projector service - infrastructure projector for debugging */}}
{{- if .Values.infrastructure.log.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "angzarr.fullname" . }}-log
  labels:
    {{- include "angzarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
    angzarr.io/service: log
  {{- if .Values.reloader.enabled }}
  annotations:
    reloader.stakater.com/auto: "true"
  {{- end }}
spec:
  replicas: {{ .Values.infrastructure.log.replicas }}
  selector:
    matchLabels:
      {{- include "angzarr.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: infrastructure
      angzarr.io/service: log
  template:
    metadata:
      labels:
        {{- include "angzarr.labels" . | nindent 8 }}
        app.kubernetes.io/component: infrastructure
        angzarr.io/service: log
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "angzarr.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- if .Values.amqp.enabled }}
        # Wait for RabbitMQ (deployed by Terraform)
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for RabbitMQ..."
              until nc -z angzarr-mq-rabbitmq 5672 2>/dev/null; do sleep 2; done
              echo "RabbitMQ is ready"
        {{- end }}
      containers:
        # Log projector - receives events from sidecar, prints to stdout
        - name: log
          securityContext:
            {{- include "angzarr.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.images.log.repository }}:{{ .Values.images.log.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.images.log.pullPolicy }}
          ports:
            # Projector gRPC (receives events from sidecar)
            - name: grpc
              containerPort: {{ .Values.infrastructure.log.port | default 50051 }}
              protocol: TCP
          env:
            - name: ANGZARR_LOG
              value: {{ .Values.logging.level }}
            # Transport — bind to all interfaces, projector gRPC service
            - name: ANGZARR__TRANSPORT__TCP__HOST
              value: "0.0.0.0"
            - name: ANGZARR__TRANSPORT__TCP__PORT
              value: "{{ .Values.infrastructure.log.port | default 50051 }}"
            {{- include "angzarr.otel-env" (dict "root" . "service" "log" "domain" "projector") | nindent 12 }}
          resources:
            {{- toYaml .Values.infrastructure.log.resources | nindent 12 }}

        # Projector sidecar - subscribes to all AMQP events and forwards to log
        - name: angzarr
          securityContext:
            {{- include "angzarr.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.images.projector.repository }}:{{ .Values.images.projector.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.images.projector.pullPolicy }}
          env:
            - name: ANGZARR_LOG
              value: {{ .Values.logging.level }}
            # Target: log projector container
            - name: ANGZARR__TARGET__ADDRESS
              value: "localhost:{{ .Values.infrastructure.log.port | default 50051 }}"
            - name: ANGZARR__TARGET__DOMAIN
              value: "log"
            # Subscribe to ALL events
            {{- if .Values.amqp.enabled }}
            - name: ANGZARR__MESSAGING__TYPE
              value: "amqp"
            - name: ANGZARR__MESSAGING__AMQP__URL
              {{- if .Values.amqp.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.amqp.existingSecret }}
                  key: uri
              {{- else }}
              value: {{ .Values.amqp.url }}
              {{- end }}
            # Subscribe to all domains
            - name: ANGZARR__MESSAGING__AMQP__DOMAIN
              value: "#"
            {{- end }}
            {{- include "angzarr.otel-env" (dict "root" . "service" "projector" "domain" "log") | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
