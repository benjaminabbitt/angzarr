{{- /* gRPC Gateway deployment - REST proxy with OpenAPI */}}
{{- if .Values.infrastructure.gateway.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "angzarr.fullname" . }}-grpc-gateway
  labels:
    {{- include "angzarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
    angzarr.io/service: grpc-gateway
  {{- if .Values.reloader.enabled }}
  annotations:
    reloader.stakater.com/auto: "true"
  {{- end }}
spec:
  replicas: {{ .Values.infrastructure.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "angzarr.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: infrastructure
      angzarr.io/service: grpc-gateway
  template:
    metadata:
      labels:
        {{- include "angzarr.labels" . | nindent 8 }}
        app.kubernetes.io/component: infrastructure
        angzarr.io/service: grpc-gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "angzarr.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gateway
          securityContext:
            {{- include "angzarr.containerSecurityContext" . | nindent 12 }}
          image: "{{ .Values.infrastructure.gateway.image.repository }}:{{ .Values.infrastructure.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.infrastructure.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.infrastructure.gateway.port }}
              protocol: TCP
          env:
            - name: GRPC_TARGET
              value: {{ .Values.infrastructure.gateway.grpcTarget | quote }}
            {{- if .Values.infrastructure.gateway.descriptorConfigMap }}
            - name: DESCRIPTOR_PATH
              value: "/config/types.bin"
            {{- end }}
          {{- if .Values.infrastructure.gateway.descriptorConfigMap }}
          volumeMounts:
            - name: descriptor
              mountPath: /config
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.infrastructure.gateway.resources | nindent 12 }}
      {{- if .Values.infrastructure.gateway.descriptorConfigMap }}
      volumes:
        - name: descriptor
          configMap:
            name: {{ .Values.infrastructure.gateway.descriptorConfigMap }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "angzarr.fullname" . }}-grpc-gateway
  labels:
    {{- include "angzarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
    angzarr.io/service: grpc-gateway
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.infrastructure.gateway.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "angzarr.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: infrastructure
    angzarr.io/service: grpc-gateway
{{- end }}
