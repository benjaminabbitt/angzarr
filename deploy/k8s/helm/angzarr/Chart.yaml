apiVersion: v2
name: angzarr
description: Schema-first CQRS/ES framework for polyglot client logic
type: application
version: 0.2.3
appVersion: "0.2.3"
home: https://github.com/angzarr-io/angzarr
sources:
  - https://github.com/angzarr-io/angzarr
keywords:
  - cqrs
  - event-sourcing
  - rust
  - grpc
  - kubernetes
  - sidecar
maintainers:
  - name: Benjamin Abbitt

annotations:
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: MIT
  artifacthub.io/operator: "false"
  artifacthub.io/prerelease: "true"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/images: |
    - name: aggregate
      image: ghcr.io/angzarr-io/angzarr-aggregate:latest
    - name: projector
      image: ghcr.io/angzarr-io/angzarr-projector:latest
    - name: saga
      image: ghcr.io/angzarr-io/angzarr-saga:latest
    - name: process-manager
      image: ghcr.io/angzarr-io/angzarr-process-manager:latest
    - name: stream
      image: ghcr.io/angzarr-io/angzarr-stream:latest
    - name: gateway
      image: ghcr.io/angzarr-io/angzarr-grpc-gateway:latest
    - name: log
      image: ghcr.io/angzarr-io/angzarr-log:latest
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/angzarr-io/angzarr/blob/main/README.md
    - name: Source
      url: https://github.com/angzarr-io/angzarr
  artifacthub.io/changes: |
    - kind: fixed
      description: Fixed gateway port to match binary default (8080 instead of 9084)
    - kind: fixed
      description: Fixed RabbitMQ default credentials to match rabbitmq-simple chart (angzarr:angzarr)
    - kind: changed
      description: Updated defaults - postgres host, rabbitmq enabled, gateway enabled
    - kind: added
      description: OCI registry publishing support
