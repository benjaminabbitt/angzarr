# Floci AWS Emulator configuration
#
# Install this chart:
#   helm install angzarr-floci ./deploy/k8s/helm/floci -n angzarr --create-namespace

# Instance name
name: angzarr-floci

# Floci image (from Docker Hub)
image:
  repository: hectorvent/floci
  tag: "latest"
  pullPolicy: IfNotPresent

# AWS emulation configuration
config:
  # Default AWS region for all services
  defaultRegion: us-east-1
  # Default AWS account ID
  defaultAccountId: "000000000000"
  # Base URL (auto-configured, override for external access)
  baseUrl: ""

# Storage configuration
storage:
  # Mode: memory, persistent, or hybrid (memory + disk for S3 objects)
  mode: hybrid
  # Persistent storage path inside container
  persistentPath: /data
  # PVC settings (only used if mode is persistent or hybrid)
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Security context
securityContext:
  runAsNonRoot: false
  runAsUser: 0
  fsGroup: 0

# Service configuration
service:
  type: ClusterIP
  port: 4566
  # NodePort for Kind access (only used if type: NodePort)
  nodePort: 31566

# Replicas (Floci is stateful, recommend 1)
replicas: 1

# Probes
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    path: /
  readiness:
    enabled: true
    initialDelaySeconds: 3
    periodSeconds: 5
    path: /

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
