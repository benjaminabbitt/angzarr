apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "angzarr-floci.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "angzarr-floci.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "angzarr-floci.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "angzarr-floci.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
      containers:
        - name: floci
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: FLOCI_DEFAULT_REGION
              value: "{{ .Values.config.defaultRegion }}"
            - name: FLOCI_DEFAULT_ACCOUNT_ID
              value: "{{ .Values.config.defaultAccountId }}"
            {{- if .Values.config.baseUrl }}
            - name: FLOCI_BASE_URL
              value: "{{ .Values.config.baseUrl }}"
            {{- end }}
            - name: FLOCI_STORAGE_MODE
              value: "{{ .Values.storage.mode }}"
            - name: FLOCI_STORAGE_PERSISTENT_PATH
              value: "{{ .Values.storage.persistentPath }}"
          ports:
            - name: http
              containerPort: 4566
              protocol: TCP
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.storage.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.storage.persistentPath }}
          {{- end }}
      {{- if .Values.storage.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "angzarr-floci.fullname" . }}-data
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
