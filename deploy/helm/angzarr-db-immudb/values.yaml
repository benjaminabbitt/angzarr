# ImmuDB Helm Chart Values

replicaCount: 1

image:
  repository: codenotary/immudb
  tag: "1.9.5"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ImmuDB configuration
immudb:
  # Admin password (required for production)
  adminPassword: ""
  # Metrics endpoint
  metricsPort: 9497
  # Web console
  webServerPort: 8080

service:
  type: ClusterIP
  port: 3322
  metricsPort: 9497
  webPort: 8080

persistence:
  enabled: true
  storageClass: ""
  size: 10Gi
  accessMode: ReadWriteOnce

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Service account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod security context
podSecurityContext:
  fsGroup: 3322

securityContext:
  runAsNonRoot: true
  runAsUser: 3322

# Liveness and readiness probes
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
