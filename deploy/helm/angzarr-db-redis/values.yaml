# Redis Helm Chart Values (Bitnami wrapper)
# See https://github.com/bitnami/charts/tree/main/bitnami/redis for all options

redis:
  # Architecture: standalone or replication
  architecture: standalone

  # Authentication
  auth:
    enabled: true
    # Leave empty to auto-generate
    password: ""

  # Master configuration
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # Replica configuration (only used if architecture: replication)
  replica:
    replicaCount: 0
    persistence:
      enabled: true
      size: 8Gi
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

  # Metrics (Prometheus)
  metrics:
    enabled: false
