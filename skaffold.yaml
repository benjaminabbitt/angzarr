apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: angzarr-build

# IMPORTANT: All image builds MUST go through skaffold.
# Do NOT manually build with podman/docker and helm upgrade.
#
# Why: Kind nodes cache images by tag at the containerd level. If you push
# a new image with the same tag (e.g., :latest), the node will continue
# serving the old cached image even after `kubectl rollout restart`.
#
# Skaffold solves this by using content-addressable tags (git commit SHA).
# Each build gets a unique tag, so there's never a cache collision.

# Import base image builds - provides angzarr-rust with content-addressed tags
requires:
  - path: build/images/skaffold.yaml
    configs: ["angzarr-images"]

build:
  # Git-based tags - unique per commit, no registry checks during tag computation
  # (inputDigest requires resolving base images which triggers registry lookups)
  tagPolicy:
    gitCommit: {}
  local:
    push: false  # CI uses --push flag
    useBuildkit: true
    tryImportMissing: true
  artifacts:
    # Dev targets (default) - fast native builds
    # RUST_IMAGE injected via requires dependency (not :latest)
    - image: ghcr.io/angzarr-io/angzarr-aggregate
      context: ../..
      docker:
        dockerfile: core/main/Containerfile
        target: angzarr-aggregate-dev
      requires:
        - image: ghcr.io/angzarr-io/angzarr-rust
          alias: RUST_IMAGE

    - image: ghcr.io/angzarr-io/angzarr-projector
      context: ../..
      docker:
        dockerfile: core/main/Containerfile
        target: angzarr-projector-dev
      requires:
        - image: ghcr.io/angzarr-io/angzarr-rust
          alias: RUST_IMAGE

    - image: ghcr.io/angzarr-io/angzarr-saga
      context: ../..
      docker:
        dockerfile: core/main/Containerfile
        target: angzarr-saga-dev
      requires:
        - image: ghcr.io/angzarr-io/angzarr-rust
          alias: RUST_IMAGE

    - image: ghcr.io/angzarr-io/angzarr-process-manager
      context: ../..
      docker:
        dockerfile: core/main/Containerfile
        target: angzarr-process-manager-dev
      requires:
        - image: ghcr.io/angzarr-io/angzarr-rust
          alias: RUST_IMAGE

    - image: ghcr.io/angzarr-io/angzarr-grpc-gateway
      context: ../..
      docker:
        dockerfile: core/main/gateway/Containerfile

profiles:
  # Release profile - slow musl builds, minimal images
  - name: release
    build:
      artifacts:
        - image: ghcr.io/angzarr-io/angzarr-aggregate
          context: ../..
          docker:
            dockerfile: core/main/Containerfile
            target: angzarr-aggregate
          requires:
            - image: ghcr.io/angzarr-io/angzarr-rust
              alias: RUST_IMAGE

        - image: ghcr.io/angzarr-io/angzarr-projector
          context: ../..
          docker:
            dockerfile: core/main/Containerfile
            target: angzarr-projector
          requires:
            - image: ghcr.io/angzarr-io/angzarr-rust
              alias: RUST_IMAGE

        - image: ghcr.io/angzarr-io/angzarr-saga
          context: ../..
          docker:
            dockerfile: core/main/Containerfile
            target: angzarr-saga
          requires:
            - image: ghcr.io/angzarr-io/angzarr-rust
              alias: RUST_IMAGE

        - image: ghcr.io/angzarr-io/angzarr-process-manager
          context: ../..
          docker:
            dockerfile: core/main/Containerfile
            target: angzarr-process-manager
          requires:
            - image: ghcr.io/angzarr-io/angzarr-rust
              alias: RUST_IMAGE

        - image: ghcr.io/angzarr-io/angzarr-grpc-gateway
          context: ../..
          docker:
            dockerfile: core/main/gateway/Containerfile
