openapi: 3.0.3
info:
  title: Angzarr Topology API
  description: REST API for topology visualization and component graph queries
  version: 0.1.0
  contact:
    name: Angzarr
    url: https://github.com/benjaminabbitt/angzarr

servers:
  - url: http://localhost:9099
    description: Local development

paths:
  /api/graph/nodes:
    get:
      summary: Get topology nodes
      description: Returns all nodes in the topology graph (components)
      operationId: getNodes
      tags:
        - Topology
      responses:
        '200':
          description: List of topology nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Node'

  /api/graph/edges:
    get:
      summary: Get topology edges
      description: Returns all edges in the topology graph (event/command flows)
      operationId: getEdges
      tags:
        - Topology
      responses:
        '200':
          description: List of topology edges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Edge'

components:
  schemas:
    Node:
      type: object
      properties:
        id:
          type: string
          description: Unique node identifier
        title:
          type: string
          description: Component name
        subtitle:
          type: string
          description: Component type (aggregate, saga, projector, pm)
        mainStat:
          type: string
          description: Event count
        secondaryStat:
          type: string
          description: Last event timestamp
      required:
        - id
        - title

    Edge:
      type: object
      properties:
        id:
          type: string
          description: Unique edge identifier
        source:
          type: string
          description: Source node ID
        target:
          type: string
          description: Target node ID
        mainStat:
          type: string
          description: Event/command types flowing on this edge
      required:
        - id
        - source
        - target
